// Utility
function genId() { return Math.random().toString(36).substr(2, 6).toUpperCase(); }

function normalizeLettersLetter(letter = '') {
  const value = (letter || '').toString().trim();
  if (!value) return '';
  const char = value.charAt(0);
  if (['ا', 'أ', 'إ', 'آ'].includes(char)) return REQUIRED_BOARD_LETTER;
  return char;
}

function shuffleArray(items = []) {
  const arr = [...items];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getAvailableLettersForBoard() {
  const seen = new Set(
    state.questions
      .map(q => normalizeLettersLetter(q.letter))
      .filter(letter => LETTERS_ALPHABET.includes(letter))
  );
  return LETTERS_ALPHABET.filter(letter => seen.has(letter));
}

function getLettersQuestionsForLetter(letter) {
  const normalized = normalizeLettersLetter(letter);
  return state.questions.filter(q => normalizeLettersLetter(q.letter) === normalized);
}
function escapeHtml(value = '') {
  return (value || '').toString()
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function getLettersTeamMeta(team) {
  return LETTERS_TEAMS.find(item => item.id === team) || LETTERS_TEAMS[0];
}
function getLettersManager(room = state.room) {
  const players = room?.players ? Object.values(room.players) : [];
  return players.find(player => player.role === 'manager' || player.id === room?.host) || null;
}
function getLettersPlayers(room = state.room) {
  const players = room?.players ? Object.values(room.players) : [];
  return players.filter(player => (player.role || 'player') !== 'manager');
}
function getLettersTeamMembers(team, room = state.room) {
  return getLettersPlayers(room).filter(player => player.team === team);
}
function getLettersChatAppearance(senderId, room = state.room) {
  const senderRef = typeof senderId === 'string' ? { senderId } : (senderId || {});
  const sender = room?.players?.[senderRef.senderId];
  const role = sender?.role || senderRef.senderRole || 'player';
  const team = sender?.team || senderRef.senderTeam || '';
  if (role === 'manager') {
    return { accent: '#d97706', soft: '#fff7ed', text: '#9a3412', border: '#fbbf24' };
  }
  if (team) {
    const teamMeta = getLettersTeamMeta(team);
    return { accent: teamMeta.hex, soft: teamMeta.soft, text: teamMeta.hex, border: teamMeta.hex };
  }
  return { accent: '#475569', soft: '#f8fafc', text: '#334155', border: '#cbd5e1' };
}
function getLettersRenderSignature(room = state.room) {
  return JSON.stringify({
    id: room?.id || '',
    status: room?.status || '',
    host: room?.host || '',
    players: room?.players || {},
    presence: room?.presence || {},
    letters: room?.letters || {}
  });
}
function getLettersPlayerCount(room = state.room) {
  return getLettersPlayers(room).length;
}
function getLettersCurrentCell(room = state.room) {
  const cellId = room?.letters?.currentCellId || '';
  return cellId ? room?.letters?.cells?.[cellId] || null : null;
}
function getLettersCellPosition(cell) {
  const index = Number(cell?.index);
  if (!Number.isFinite(index) || index < 0) return null;
  return {
    col: Math.floor(index / 5),
    row: index % 5
  };
}
function getLettersCellByPosition(letters, col, row) {
  if (col < 0 || col > 4 || row < 0 || row > 4) return null;
  return letters?.cells?.[`c${(col * 5) + row}`] || null;
}
function getLettersNeighborIds(cell, letters) {
  const pos = getLettersCellPosition(cell);
  if (!pos) return [];
  const offsets = [
    [0, -1],
    [0, 1]
  ];
  if (pos.col % 2 === 0) {
    offsets.push([-1, -1], [-1, 0], [1, -1], [1, 0]);
  } else {
    offsets.push([-1, 0], [-1, 1], [1, 0], [1, 1]);
  }
  return offsets
    .map(([dc, dr]) => getLettersCellByPosition(letters, pos.col + dc, pos.row + dr))
    .filter(Boolean)
    .map(item => item.id);
}
function getLettersWinningTeam(letters) {
  const cells = letters?.cells ? Object.values(letters.cells) : [];
  for (const team of ['green', 'red']) {
    const visited = new Set();
    const queue = [];
    cells.forEach(cell => {
      if (cell.owner !== team) return;
      const pos = getLettersCellPosition(cell);
      if (!pos) return;
      const isStart = team === 'green' ? pos.col === 0 : pos.row === 0;
      if (isStart) {
        queue.push(cell);
        visited.add(cell.id);
      }
    });
    while (queue.length) {
      const current = queue.shift();
      const pos = getLettersCellPosition(current);
      if (!pos) continue;
      const reachedEnd = team === 'green' ? pos.col === 4 : pos.row === 4;
      if (reachedEnd) return team;
      getLettersNeighborIds(current, letters).forEach(id => {
        if (visited.has(id)) return;
        const nextCell = letters.cells?.[id];
        if (!nextCell || nextCell.owner !== team) return;
        visited.add(id);
        queue.push(nextCell);
      });
    }
  }
  return '';
}
function rememberChatDraft(value) {
  state.chatDraft = value;
}
function getActiveChatInputId() {
  const active = document.activeElement;
  return active?.id || '';
}
function restoreChatInputFocus(inputId = '') {
  if (!inputId) return;
  setTimeout(() => {
    const input = document.getElementById(inputId);
    if (!input) return;
    input.focus();
    const length = input.value.length;
    if (typeof input.setSelectionRange === 'function') input.setSelectionRange(length, length);
  }, 0);
}
function clearLettersTransientTimeout() {
  clearTimeout(state.lettersTransientTimeout);
  state.lettersTransientTimeout = null;
}
function getLettersActiveLiveResult(room = state.room) {
  const result = room?.letters?.liveResult;
  if (!result?.shownAt) return null;
  const elapsed = estimatedServerNow() - Number(result.shownAt || 0);
  if (elapsed >= LETTERS_LIVE_RESULT_DURATION) return null;
  return result;
}
function getLettersVisibleQuestion(room = state.room) {
  const question = room?.letters?.currentQuestion;
  const visibleUntil = Number(room?.letters?.questionVisibleUntil || 0);
  if (!question?.id || !room?.letters?.showQuestionInLive || visibleUntil <= estimatedServerNow()) return null;
  return question;
}
function getLettersQuestionRemainingMs(room = state.room) {
  const visibleUntil = Number(room?.letters?.questionVisibleUntil || 0);
  return Math.max(0, visibleUntil - estimatedServerNow());
}
function getLettersQuestionRemainingSeconds(room = state.room) {
  const remaining = getLettersQuestionRemainingMs(room);
  return remaining ? Math.ceil(remaining / 1000) : 0;
}
function syncLettersTransientTimeout(room = state.room) {
  clearLettersTransientTimeout();
  let remaining = 0;
  const result = getLettersActiveLiveResult(room);
  if (result) {
    remaining = LETTERS_LIVE_RESULT_DURATION - (estimatedServerNow() - Number(result.shownAt || 0));
  }
  const questionRemaining = getLettersQuestionRemainingMs(room);
  if (questionRemaining) {
    remaining = remaining ? Math.min(remaining, questionRemaining) : questionRemaining;
  }
  if (!remaining) return;
  state.lettersTransientTimeout = setTimeout(() => {
    state.lettersTransientTimeout = null;
    renderCurrentPage();
  }, Math.max(60, remaining + 60));
}
function renderLettersChatMessagesMarkup(msgs = state.chatMessages, room = state.room) {
  if (!msgs.length) return '<p class="text-slate-400 text-sm text-center py-8">ابدأوا الدردشة أثناء اللعب</p>';
  return msgs.map(msg => {
    const appearance = getLettersChatAppearance(msg, room);
    const sentAt = formatChatTime(msg);
    const isMine = msg.senderId === state.playerId;
    return `
      <div class="text-sm ${isMine ? 'text-left' : 'text-right'}">
        <div class="flex items-center gap-2 ${isMine ? 'justify-end' : 'justify-start'}">
          <span class="font-black" style="color:${appearance.accent}">${escapeHtml(msg.senderName)}</span>
          ${sentAt ? `<span class="text-[11px] text-slate-400 font-bold">${sentAt}</span>` : ''}
        </div>
        <p class="inline-block px-3 py-2 rounded-2xl mt-1 border-2" style="background:${appearance.soft};color:${appearance.text};border-color:${appearance.border}">${escapeHtml(msg.text)}</p>
      </div>`;
  }).join('');
}
function updateLettersGameChatInPlace() {
  const messagesEl = document.getElementById('lettersGameChatMessages');
  if (!messagesEl) return false;
  messagesEl.innerHTML = renderLettersChatMessagesMarkup(state.chatMessages, state.room);
  const countEl = document.getElementById('lettersGameChatCount');
  if (countEl) countEl.textContent = `${state.chatMessages.length} رسالة`;
  scrollMessagesToBottom('lettersGameChatMessages');
  return true;
}
function getChatTimestamp(message = {}) {
  const stamp = Number(message?.time || message?.clientTime || 0);
  return Number.isFinite(stamp) ? stamp : 0;
}
function formatChatTime(message = {}) {
  const stamp = getChatTimestamp(message);
  if (!stamp) return '';
  return new Date(stamp).toLocaleTimeString('ar-KW', {
    hour: 'numeric',
    minute: '2-digit'
  });
}
function normalizeChatMessages(chatMap = {}) {
  return Object.entries(chatMap)
    .map(([id, msg]) => ({ id, ...(msg || {}) }))
    .sort((a, b) => {
      const orderA = Number(a.order);
      const orderB = Number(b.order);
      const hasOrderA = Number.isFinite(orderA);
      const hasOrderB = Number.isFinite(orderB);
      if (hasOrderA && hasOrderB && orderA !== orderB) return orderA - orderB;
      const timeDelta = getChatTimestamp(a) - getChatTimestamp(b);
      if (timeDelta !== 0) return timeDelta;
      if (hasOrderA && !hasOrderB) return -1;
      if (!hasOrderA && hasOrderB) return 1;
      return String(a.id || '').localeCompare(String(b.id || ''));
    });
}
function renderLettersTeamChips(room = state.room, compact = false) {
  return LETTERS_TEAMS.map(team => {
    const members = getLettersTeamMembers(team.id, room);
    return `
      <div class="rounded-2xl px-3 py-2 ${compact ? '' : 'min-w-[150px]'}" style="background:${team.soft};border:2px solid ${team.hex}">
        <p class="font-black text-sm" style="color:${team.hex}">${team.name}</p>
        <p class="text-xs text-slate-500 mt-1">${members.length ? members.map(player => player.name).join(' • ') : 'لا يوجد لاعبون بعد'}</p>
      </div>`;
  }).join('');
}
function getQuestionRoundKey(q) {
  if (!q) return '';
  return [q.id || '', q.cat || '', q.pts || q.points || '', q.startTime || 'pending'].join('::');
}
function getAnswerChoice(answerEntry) {
  if (typeof answerEntry === 'string') return answerEntry;
  return answerEntry?.choice || '';
}

  return Date.now() + Number(state.serverTimeOffset || 0);

function getRoutePagePath(game = state.gameMode) {
  const path = window.location.pathname;
  const baseDir = /\.[a-z0-9]+$/i.test(path)
    ? path.replace(/[^/]+$/, '')
    : (path.endsWith('/') ? path : `${path}/`);
  return `${baseDir}${game === 'letters' ? 'letters.html' : 'index.html'}`;
}
function buildRouteUrl({ game = state.gameMode, room = '', panel = '', token = '' } = {}) {
  const linkUrl = new URL(window.location.href);
  linkUrl.pathname = getRoutePagePath(game);
  linkUrl.search = '';
  linkUrl.hash = '';
  if (game === 'letters') {
    if (room) linkUrl.searchParams.set('r', room);
    if (panel === 'live' && token) linkUrl.searchParams.set('l', token);
    return linkUrl.toString();
  }
  if (game) linkUrl.searchParams.set('game', game);
  if (room) linkUrl.searchParams.set('room', room);
  if (panel) linkUrl.searchParams.set('panel', panel);
  if (token) linkUrl.searchParams.set('token', token);
  return linkUrl.toString();
}
function buildShareLink(roomId = state.roomId, extra = {}) {
  return buildRouteUrl({ room: roomId, ...extra });
}
function buildModeLink(game) {
  return buildRouteUrl({ game });
}
function getLettersRoomRef(roomId = state.roomId) {
  return db.ref('letterRooms/' + roomId);
}
function getGameRoomRef(roomId = state.roomId, roomLike = state.room) {
  const isLettersRoom = roomLike?.game === 'letters' || (isLettersMode() && !roomLike?.game);
  return db.ref(`${isLettersRoom ? 'letterRooms' : 'rooms'}/${roomId}`);
}
function getPresenceRef(roomId = state.roomId, playerId = state.playerId) {
  const base = isLettersMode() ? 'letterRooms' : 'rooms';
  return db.ref(`${base}/${roomId}/presence/${playerId}`);
}
function setRoomUrl(roomId = state.roomId) {
  if (!roomId) return;
  window.history.replaceState({}, '', buildShareLink(roomId));
}
function loadRoomSession() {
  try {
    return JSON.parse(localStorage.getItem(ROOM_SESSION_KEY) || 'null');
  } catch (_) {
    return null;
  }
}
function persistRoomSession() {
  if (!state.roomId || !state.playerId) {
    clearRoomSession();
    return;
  }
  try {
    localStorage.setItem(ROOM_SESSION_KEY, JSON.stringify({
      roomId: state.roomId,
      playerId: state.playerId,
      playerName: state.playerName || '',
      isHost: !!state.isHost,
      gameMode: state.gameMode || 'quiz'
    }));
  } catch (_) {}
}
function clearRoomSession() {
  try {
    localStorage.removeItem(ROOM_SESSION_KEY);
  } catch (_) {}
}
function stopPresenceTracking(markOffline = true) {
  if (state.connectedRef && state.connectedCb) {
    state.connectedRef.off('value', state.connectedCb);
  }
  if (state.roomId && state.playerId) {
    const presenceRef = getPresenceRef();
    presenceRef.onDisconnect().cancel().catch(() => {});
    if (markOffline) {
      presenceRef.update({
        online: false,
        name: state.playerName || '',
        lastSeen: firebase.database.ServerValue.TIMESTAMP
      }).catch(() => {});
    }
  }
  state.connectedRef = null;
  state.connectedCb = null;
}
function startPresenceTracking() {
  stopPresenceTracking(false);
  if (!state.roomId || !state.playerId) return;
  const presenceRef = getPresenceRef();
  const connectedRef = firebase.database().ref('.info/connected');
  const cb = (snap) => {
    if (snap.val() !== true) return;
    presenceRef.onDisconnect().update({
      online: false,
      name: state.playerName || '',
      lastSeen: firebase.database.ServerValue.TIMESTAMP
    }).catch(() => {});
    presenceRef.update({
      online: true,
      name: state.playerName || '',
      lastSeen: firebase.database.ServerValue.TIMESTAMP
    }).catch(() => {});
  };
  connectedRef.on('value', cb);
  state.connectedRef = connectedRef;
  state.connectedCb = cb;
}
function resetRoomState({ markOffline = false, clearSession = true } = {}) {
  clearQuestionTimers();
  clearStageTimeout();
  clearLettersTransientTimeout();
  cleanupListeners();
  stopPresenceTracking(markOffline);
  if (clearSession) clearRoomSession();
  state = {
    ...state,
    page: 'home',
    lettersPanel: '',
    playerId: '',
    roomId: '',
    isHost: false,
    room: null,

function formatPresenceStatus(playerId) {
  const presence = state.room?.presence?.[playerId];
  if (presence?.online) return 'متصل الآن';
  if (!presence?.lastSeen) return 'غير متصل';
  const diffMins = Math.max(1, Math.floor((Date.now() - presence.lastSeen) / 60000));
  if (diffMins < 60) return `آخر ظهور قبل ${diffMins} د`;
  const diffHours = Math.floor(diffMins / 60);
  if (diffHours < 24) return `آخر ظهور قبل ${diffHours} س`;
  const diffDays = Math.floor(diffHours / 24);
  return `آخر ظهور قبل ${diffDays} ي`;

function getContrastTextColor(hex) {
  if (!hex || !hex.startsWith('#') || hex.length !== 7) return '#ffffff';
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const luminance = (0.299 * r) + (0.587 * g) + (0.114 * b);
  return luminance > 170 ? '#111827' : '#ffffff';
}

function scheduleQuestionReveal(expectedQuestionKey, delayMs) {
  clearStageTimeout();
  state.stageTimeout = setTimeout(async () => {
    await db.ref(`rooms/${state.roomId}`).transaction(room => {
      if (!room || room.status !== 'loading' || !room.currentQ) return room;
      if (getQuestionRoundKey(room.currentQ) !== expectedQuestionKey) return room;
      room.status = 'question';
      room.currentQ.startTime = estimatedServerNow();
      room.currentQ.answerCounter = 0;
      room.currentQ.evaluatingAt = null;
      room.answers = null;
      room.answerTimes = null;
      room.answerOrders = null;
      return room;
    });
  }, Math.max(0, delayMs));
}
function scheduleAnswerAnalysis(expectedQuestionKey, delayMs) {

  state.stageTimeout = setTimeout(async () => {

  }, Math.max(0, delayMs));
}
async function removePlayerFromRoom(playerId, roomOverride = null) {
  const roomId = roomOverride?.id || state.roomId;
  if (!roomId || !playerId) return false;
  const roomRef = getGameRoomRef(roomId, roomOverride || state.room);
  const room = roomOverride?.players ? roomOverride : state.room || (await roomRef.once('value')).val();
  if (!room?.players?.[playerId]) return false;

  if (room.game === 'letters') {
    if (playerId === room.host) {
      await roomRef.remove();
      return true;
    }
    await roomRef.update({
      [`players/${playerId}`]: null,
      [`presence/${playerId}`]: null
    });
    return true;
  }

  const remainingPlayers = Object.values(room.players).filter(p => p.id !== playerId);
  if (remainingPlayers.length === 0) {
    await roomRef.remove();
    return true;
  }

  const updates = {
    [`players/${playerId}`]: null,
    [`presence/${playerId}`]: null,
    [`answers/${playerId}`]: null,
    [`answerTimes/${playerId}`]: null,
    [`answerOrders/${playerId}`]: null
  };

  if (room.host === playerId) {
    updates.host = remainingPlayers[0].id;
  }

  const turnOrder = Array.isArray(room.turnOrder) ? room.turnOrder : [];
  if (turnOrder.length) {
    const removedIdx = turnOrder.indexOf(playerId);
    const nextTurnOrder = turnOrder.filter(id => id !== playerId);
    updates.turnOrder = nextTurnOrder.length ? nextTurnOrder : null;
    if (nextTurnOrder.length) {
      let nextTurnIndex = room.turnIndex || 0;
      if (removedIdx !== -1) {
        if (removedIdx < nextTurnIndex) nextTurnIndex -= 1;
        if (removedIdx === nextTurnIndex && nextTurnIndex >= nextTurnOrder.length) nextTurnIndex = 0;
      }
      updates.turnIndex = Math.max(0, nextTurnIndex % nextTurnOrder.length);
    } else {
      updates.turnIndex = 0;
    }
  }

  if (room.status === 'question' && remainingPlayers.length > 1) {
    const remainingAnswered = remainingPlayers.every(player => !!getAnswerChoice(room.answers?.[player.id]));
    if (remainingAnswered) {
      updates.status = 'evaluating';
      updates['currentQ/evaluatingAt'] = estimatedServerNow();
    }
  }

  if (remainingPlayers.length <= 1 && !['lobby', 'winner'].includes(room.status)) {
    updates.status = 'winner';
    updates.currentQ = null;
    updates.answers = null;
    updates.answerTimes = null;
    updates.answerOrders = null;
  }

  await roomRef.update(updates);
  return true;
}
async function kickPlayer(playerId) {
  const room = state.room;
  if (!state.isHost || !room?.players?.[playerId]) return;
  if (playerId === room.host) {

// Firebase helpers
function listenRoom(roomId) {
  cleanupListeners();
  const ref = db.ref('rooms/' + roomId);
  const cb = ref.on('value', snap => {
    const data = snap.val();
    if (!data) {
      if (state.roomId) resetRoomState();
      return;
    }
    if (state.playerId && data.players && !data.players[state.playerId]) {
      resetRoomState();
      showToast('تم إخراجك من الغرفة');
      return;
    }
    state.room = data;
    if (state.playerId) {
      state.isHost = data.host === state.playerId;
      state.playerName = data.players?.[state.playerId]?.name || state.playerName;
      persistRoomSession();
      setRoomUrl(data.id || state.roomId);
    }
    if (data.status !== 'question') {
      clearQuestionTimers();
      state.evaluatingQuestionKey = '';
    }
    if (!['result', 'noAnswer'].includes(data.status)) {
      clearStageTimeout();
    }
    // Update chat
    if (data.chat) {
      const msgs = normalizeChatMessages(data.chat);
      const chatVisible = state.chatOpen || state.page === 'winner';
      if (!chatVisible) {
        const newCount = msgs.length - state.chatMessages.length;
        if (newCount > 0) state.unreadCount += newCount;
      } else {
        state.unreadCount = 0;
      }
      state.chatMessages = msgs;
    } else {
      state.chatMessages = [];
      state.unreadCount = 0;
    }
    renderCurrentPage();
  });
  state.listeners.push({ ref, cb });
}

function cleanupListeners() {
  clearLettersTransientTimeout();
  state.listeners.forEach(l => l.ref.off('value', l.cb));
  state.listeners = [];
}

// Load questions from Firebase
async function loadQuestionsFromFirebase() {
  const lettersMode = isLettersMode();
  const path = lettersMode ? 'letterQuestions' : 'questions';
  const snap = await db.ref(path).once('value');
  const data = snap.val();
  if (!data) { state.questions = []; state.categories = []; return; }
  state.questions = Object.entries(data).map(([id, q]) => lettersMode
    ? { id, ...q, letter: normalizeLettersLetter(q.letter) }
    : { id, ...q }
  );
  state.categories = lettersMode
    ? LETTERS_ALPHABET.filter(letter => state.questions.some(q => q.letter === letter))
    : [...new Set(state.questions.map(q => q.category))];
}

async function restoreRoomSession() {
  const saved = loadRoomSession();
  if (!saved?.roomId || !saved?.playerId) return false;

  try {
    state.gameMode = saved.gameMode || 'quiz';
    const snap = (isLettersMode() ? await getLettersRoomRef(saved.roomId).once('value') : await db.ref('rooms/' + saved.roomId).once('value'));
    const room = snap.val();
    if (!room?.players?.[saved.playerId]) {
      clearRoomSession();
      return false;
    }

    state.roomId = saved.roomId;
    state.playerId = saved.playerId;
    state.playerName = room.players[saved.playerId]?.name || saved.playerName || '';
    state.room = room;
    state.isHost = room.host === saved.playerId;
    state.lettersPanel = '';
    state.hostPanelOpen = false;
    state.page = room.status || 'lobby';
    if (isLettersMode()) {
      listenLettersRoom(state.roomId);
    } else {
      listenRoom(state.roomId);
    }
    startPresenceTracking();
    persistRoomSession();
    setRoomUrl(state.roomId);

    return true;
  } catch (_) {

}

function checkUrlForRoom() {
  const params = new URLSearchParams(window.location.search);
  const inferredGame = /letters\.html$/i.test(window.location.pathname) ? 'letters' : '';
  const game = params.get('game') || params.get('g') || inferredGame || '';
  const roomId = params.get('r') || params.get('room');
  const liveToken = params.get('l') || '';
  const panel = liveToken ? 'live' : (params.get('panel') === 'live' ? 'live' : '');
  const token = liveToken || params.get('token') || '';
  if (game) state.gameMode = game;
  if (game === 'letters' && roomId && panel === 'live') {
    bootstrapLettersPanel(roomId, panel, token);
    return;
  }
  if (roomId) {
    state.roomId = roomId;
    state.page = 'home';
    renderHome(true);
    return;
  }
  if (game) {
    state.page = 'home';
    renderCurrentPage();
    return;
  }
  renderCurrentPage();
}

function buildLettersBoardState() {
  const availableLetters = getAvailableLettersForBoard();
  if (!availableLetters.includes(REQUIRED_BOARD_LETTER) || availableLetters.length < LETTERS_BOARD_SIZE) return null;
  const pickedLetters = shuffleArray([
    REQUIRED_BOARD_LETTER,
    ...shuffleArray(availableLetters.filter(letter => letter !== REQUIRED_BOARD_LETTER)).slice(0, LETTERS_BOARD_SIZE - 1)
  ]);
  const cells = {};
  pickedLetters.forEach((letter, i) => {
    cells[`c${i}`] = { id: `c${i}`, index: i, letter, owner: '', questionId: '' };
  });
  return {
    currentCellId: '',
    currentQuestion: null,
    questionVisibleUntil: 0,
    liveResult: null,
    usedQuestionIds: {},
    cells
  };
}

async function createLettersRoom() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { shakeEl('nameInput'); return; }
  state.playerName = name;
  state.playerId = genId();
  state.roomId = genId();
  state.isHost = true;
  state.lettersPanel = '';
  state.hostPanelOpen = false;
  await loadQuestionsFromFirebase();
  if (!state.questions.length) {
    showToast('أضف أسئلة الحروف من لوحة الإدارة أولًا');
    return;
  }
  const availableLetters = getAvailableLettersForBoard();
  if (!availableLetters.includes(REQUIRED_BOARD_LETTER)) {
    showToast('أضف أسئلة لحرف الألف أولًا');
    return;
  }
  if (availableLetters.length < LETTERS_BOARD_SIZE) {
    showToast(`أضف أسئلة لـ ${LETTERS_BOARD_SIZE} حرفًا مختلفًا على الأقل. الموجود الآن ${availableLetters.length}`);
    return;
  }
  const boardState = buildLettersBoardState();
  if (!boardState) {
    showToast('تعذّر تجهيز لوحة الحروف');
    return;
  }
  const roomData = {
    id: state.roomId,
    game: 'letters',
    host: state.playerId,
    status: 'lobby',
    managerKey: genId() + genId(),
    liveKey: genId() + genId(),
    players: {
      [state.playerId]: { name, id: state.playerId, emoji: '🎛️', color: '', score: 0, ready: true, role: 'manager', team: '' }
    },
    letters: {
      ...boardState,
      showQuestionInLive: false,
      questionVisibleUntil: 0,
      liveResult: null,
      winnerTeam: '',
      winnerAt: null
    },
    created: Date.now()
  };
  await getLettersRoomRef(state.roomId).set(roomData);
  listenLettersRoom(state.roomId);
  startPresenceTracking();
  persistRoomSession();
  setRoomUrl();
  state.page = 'lobby';
  renderCurrentPage();
}

function getLettersCells(room = state.room) {
  const cells = room?.letters?.cells ? Object.values(room.letters.cells) : [];
  return cells.sort((a, b) => Number(a.index || 0) - Number(b.index || 0));
}

function getLettersColumns(room = state.room) {
  const cells = getLettersCells(room);
  const cols = [];
  for (let i = 0; i < 5; i++) cols.push(cells.slice(i * 5, (i + 1) * 5));
  return cols;
}

function getLettersCellColor(cell, room = state.room) {
  const currentCellId = room?.letters?.currentCellId || '';
  if (!cell) return '#fff9c4';
  if (cell.owner === 'green') return '#16a34a';
  if (cell.owner === 'red') return '#ef4444';
  if (cell.id === currentCellId) return '#facc15';
  return '#fff9c4';
}

function renderLettersHex({ x = 0, y = 0, content = '', bg = '#fff9c4', textColor = '#111827', onClick = '', compact = false, title = '' } = {}) {
  const width = 96;
  const height = 84;
  const strokeWidth = 4.5;
  const fontSize = 52;
  const points = [
    [x + width * 0.25, y],
    [x + width * 0.75, y],
    [x + width, y + height * 0.5],
    [x + width * 0.75, y + height],
    [x + width * 0.25, y + height],
    [x, y + height * 0.5]
  ].map(([px, py]) => `${px},${py}`).join(' ');
  const groupAttrs = onClick ? ` onclick="${onClick}" style="cursor:pointer"` : '';
  return `
    <g${groupAttrs}>
      ${title ? `<title>${title}</title>` : ''}
      <polygon points="${points}" fill="${bg}" stroke="#111827" stroke-width="${strokeWidth}" stroke-linejoin="round" filter="url(#lettersShadow)"></polygon>
      ${content ? `<text x="${x + (width / 2)}" y="${y + (height / 2) + 4}" text-anchor="middle" dominant-baseline="middle" font-size="${fontSize}" font-weight="900" fill="${textColor}" style="paint-order:stroke;stroke:rgba(255,255,255,0.25);stroke-width:1.2px">${content}</text>` : ''}
    </g>`;
}

function renderLettersBoard(room = state.room, { interactive = false } = {}) {
  const columns = getLettersColumns(room);
  const boardWidth = 656;
  const boardHeight = 692;
  const topBottomColor = '#ef4444';
  const sideColor = '#16a34a';
  const hexWidth = 96;
  const hexHeight = 84;
  const columnStep = 72;
  const cellStepY = 84;
  const columnOffsetY = 42;
  const columnStartX = 164;
  const columnBaseY = 120;
  const topBottomYTop = 36;
  const topBottomYBottom = 540;
  const topBottomStartX = columnStartX;
  const topBottomStep = columnStep;
  const sideStartY = 78;
  const sideStep = cellStepY;
  const leftStackX = columnStartX - columnStep;
  const rightStackX = columnStartX + (4 * columnStep) + columnStep;
  const svgParts = [];

  svgParts.push(`
    <defs>
      <filter id="lettersShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.16"></feDropShadow>
      </filter>
    </defs>
  `);

  for (let i = 0; i < 5; i++) {
    const x = topBottomStartX + (i * topBottomStep);
    const topY = topBottomYTop + (i % 2 ? columnOffsetY : 0);
    const bottomY = topBottomYBottom + (i % 2 ? columnOffsetY : 0);
    svgParts.push(renderLettersHex({ x, y: topY, bg: topBottomColor, compact: true }));
    svgParts.push(renderLettersHex({ x, y: bottomY, bg: topBottomColor, compact: true }));
  }

  for (let i = 0; i < 7; i++) {
    const y = sideStartY + (i * sideStep);
    svgParts.push(renderLettersHex({ x: leftStackX, y, bg: sideColor, compact: true }));
    svgParts.push(renderLettersHex({ x: rightStackX, y, bg: sideColor, compact: true }));
  }

  columns.forEach((cells, columnIndex) => {
    const x = columnStartX + (columnIndex * columnStep);
    const startY = columnBaseY + (columnIndex % 2 ? columnOffsetY : 0);
    cells.forEach((cell, rowIndex) => {
      svgParts.push(renderLettersHex({
        x,
        y: startY + (rowIndex * cellStepY),
        content: cell.owner ? '' : cell.letter,
        bg: getLettersCellColor(cell, room),
        textColor: cell.owner ? '#ffffff' : '#111827',
        onClick: interactive ? (cell.owner ? `clearLettersCell('${cell.id}')` : `selectLettersCell('${cell.id}')`) : '',
        title: interactive ? (cell.owner ? 'إزالة لون الخلية' : 'اختر هذا الحرف') : ''
      }));
    });
  });

  return `
    <div class="rounded-[2.5rem] bg-[#111827] p-2 md:p-3 shadow-2xl overflow-hidden">
      <svg viewBox="0 0 ${boardWidth} ${boardHeight}" class="block w-full h-auto max-w-[720px] mx-auto" xmlns="http://www.w3.org/2000/svg" aria-label="لوحة ميدان الحروف" preserveAspectRatio="xMidYMid meet">
        <rect x="0" y="0" width="${boardWidth}" height="${boardHeight}" rx="42" fill="#111827"></rect>
        ${svgParts.join('')}
      </svg>
    </div>`;
}

async function listenLettersRoom(roomId) {
  cleanupListeners();
  const ref = getLettersRoomRef(roomId);
  const cb = ref.on('value', snap => {
    const data = snap.val();
    if (!data) {
      resetRoomState();
      return;
    }
    const previousRoom = state.room;
    const previousSignature = getLettersRenderSignature(previousRoom);
    state.room = data;
    if (!state.lettersPanel && state.playerId) {
      if (data.players && !data.players[state.playerId]) {
        resetRoomState();
        showToast('تم إخراجك من الغرفة');
        return;
      }
      state.isHost = data.host === state.playerId;
      state.playerName = data.players?.[state.playerId]?.name || state.playerName;
      persistRoomSession();
      setRoomUrl(data.id || state.roomId);
    }
    if (data.chat) {
      const msgs = normalizeChatMessages(data.chat);
      const chatVisible = ['game', 'winner', 'lettersLive'].includes(state.page) || state.chatOpen;
      if (!chatVisible) {
        const newCount = msgs.length - state.chatMessages.length;
        if (newCount > 0) state.unreadCount += newCount;
      } else {
        state.unreadCount = 0;
      }
      state.chatMessages = msgs;
    } else {
      state.chatMessages = [];
      state.unreadCount = 0;
    }
    const nextSignature = getLettersRenderSignature(data);
    const onlyChatChanged = !!previousRoom && previousSignature === nextSignature;
    if (onlyChatChanged && !state.lettersPanel && ['game', 'winner'].includes(state.page) && updateLettersGameChatInPlace()) {
      return;
    }
    renderCurrentPage();
  });
  state.listeners.push({ ref, cb });
}

async function bootstrapLettersPanel(roomId, panel, token) {
  const snap = await getLettersRoomRef(roomId).once('value');
  const room = snap.val();
  if (!room) {
    showToast('غرفة الحروف غير موجودة');
    goLanding();
    return;
  }
  const valid = panel === 'manager' ? token === room.managerKey : token === room.liveKey;
  if (!valid) {
    showToast('الرابط غير صالح');
    goLanding();
    return;
  }
  state.gameMode = 'letters';
  state.lettersPanel = panel;
  state.roomId = roomId;
  state.room = room;
  state.page = panel === 'manager' ? 'lettersManager' : 'lettersLive';
  await loadQuestionsFromFirebase();
  await listenLettersRoom(roomId);
  renderCurrentPage();
}

async function pickLettersQuestionForCell(cellId, excludeQuestionId = '') {
  const room = state.room;
  const cell = room.letters?.cells?.[cellId];
  if (!cell || cell.owner) return false;
  if (!state.questions.length) await loadQuestionsFromFirebase();
  const questions = getLettersQuestionsForLetter(cell.letter);
  const used = room.letters?.usedQuestionIds || {};
  let available = questions.filter(item => !used[item.id] && item.id !== excludeQuestionId);
  if (!available.length) available = questions.filter(item => item.id !== excludeQuestionId);
  if (!available.length) available = questions;
  const picked = available[Math.floor(Math.random() * available.length)];
  if (!picked) {
    showToast(`لا توجد أسئلة للحرف ${cell.letter}`);
    return false;
  }
  await getLettersRoomRef().child('letters').update({
    currentCellId: cellId,
    liveResult: null,
    showQuestionInLive: false,
    questionVisibleUntil: 0,
    currentQuestion: {
      id: picked.id,
      letter: picked.letter,
      question: picked.question,
      answer: picked.answer || ''
    }
  });
  return true;
}

async function selectLettersCell(cellId) {
  const room = state.room;
  const canControl = state.page === 'lettersManager' || (state.page === 'game' && state.isHost);
  if (!room || !canControl) return;
  if (room.status !== 'game') {
    showToast('ابدأ اللعبة أولًا');
    return;
  }
  const cell = room.letters?.cells?.[cellId];
  if (!cell) return;
  if (cell.owner) {
    await clearLettersCell(cellId);
    return;
  }
  state.lettersAnswerPickerOpen = false;
  await pickLettersQuestionForCell(cellId);
}

async function changeLettersQuestion() {
  const cellId = state.room?.letters?.currentCellId || '';
  const currentQuestionId = state.room?.letters?.currentQuestion?.id || '';
  if (!cellId) {
    showToast('اختر حرفًا أولًا');
    return;
  }
  state.lettersAnswerPickerOpen = false;
  await pickLettersQuestionForCell(cellId, currentQuestionId);
}

function toggleLettersAnswerPicker(forceState) {
  state.lettersAnswerPickerOpen = typeof forceState === 'boolean' ? forceState : !state.lettersAnswerPickerOpen;
  renderCurrentPage();
}

async function clearLettersCell(cellId) {
  const cell = state.room?.letters?.cells?.[cellId];
  if (!cell?.owner) return;
  if (!window.confirm(`إزالة لون الخلية ${cell.letter} وإرجاعها للحروف؟`)) return;
  const tx = await getLettersRoomRef().child('letters').transaction(letters => {
    const target = letters?.cells?.[cellId];
    if (!target?.owner) return;
    const questionId = target.questionId || '';
    letters.cells[cellId] = {
      ...target,
      owner: '',
      questionId: ''
    };
    if (questionId && letters.usedQuestionIds?.[questionId]) {
      delete letters.usedQuestionIds[questionId];
    }
    return letters;
  });
  if (!tx.committed) showToast('تعذر إزالة لون الخلية الآن');
}

async function claimLettersCell(team, playerId = '') {
  const room = state.room;
  const currentCellId = room?.letters?.currentCellId;
  const currentQuestion = room?.letters?.currentQuestion;
  const answeredBy = room?.players?.[playerId] || (playerId ? null : getLettersTeamMembers(team, room)[0]) || null;
  if (!currentCellId || !currentQuestion?.id) {
    showToast('اختر حرفًا أولًا');
    return;
  }
  if (!answeredBy || answeredBy.team !== team) {
    showToast('اختر اللاعب الذي أجاب أولًا');
    return;
  }
  const tx = await getLettersRoomRef().transaction(roomData => {
    if (!roomData?.letters?.currentCellId || !roomData?.letters?.currentQuestion?.id) return;
    const letters = roomData.letters;
    const cell = letters.cells?.[letters.currentCellId];
    if (!cell || cell.owner) return;
    letters.cells[letters.currentCellId] = {
      ...cell,
      owner: team,
      questionId: letters.currentQuestion.id
    };
    letters.usedQuestionIds = letters.usedQuestionIds || {};
    letters.usedQuestionIds[letters.currentQuestion.id] = true;
    letters.liveResult = {
      team,
      playerId: answeredBy.id,
      playerName: answeredBy.name,
      answer: letters.currentQuestion.answer || '',
      letter: letters.currentQuestion.letter || cell.letter || '',
      shownAt: estimatedServerNow()
    };
    letters.currentCellId = '';
    letters.currentQuestion = null;
    letters.showQuestionInLive = false;
    letters.questionVisibleUntil = 0;
    const winnerTeam = getLettersWinningTeam(letters);
    if (winnerTeam) {
      roomData.status = 'winner';
      letters.winnerTeam = winnerTeam;
      letters.winnerAt = estimatedServerNow();
    }
    return roomData;
  });
  state.lettersAnswerPickerOpen = false;
  if (!tx.committed) showToast('تعذر احتساب هذه الخلية الآن');
}

async function clearLettersSelection() {
  if (!state.roomId) return;
  state.lettersAnswerPickerOpen = false;
  await getLettersRoomRef().child('letters').update({
    currentCellId: '',
    currentQuestion: null,
    liveResult: null,
    showQuestionInLive: false,
    questionVisibleUntil: 0
  });
}

async function toggleLettersQuestionBroadcast(forceVisible = null) {
  const room = state.room;
  const currentQuestion = room?.letters?.currentQuestion;
  if (!currentQuestion?.id) {
    showToast('اختر حرفًا وسؤالًا أولًا');
    return;
  }
  const shouldShow = typeof forceVisible === 'boolean' ? forceVisible : !getLettersVisibleQuestion(room);
  await getLettersRoomRef().child('letters').update(shouldShow ? {
    showQuestionInLive: true,
    questionVisibleUntil: estimatedServerNow() + 10000
  } : {
    showQuestionInLive: false,
    questionVisibleUntil: 0
  });
}

function toggleLettersWinnerPicker(forceState) {
  state.lettersWinnerPickerOpen = typeof forceState === 'boolean' ? forceState : !state.lettersWinnerPickerOpen;

}

async function announceLettersWinner(team) {
  const teamMeta = getLettersTeamMeta(team);
  if (!window.confirm(`إعلان فوز ${teamMeta.name}؟`)) return;
  state.lettersWinnerPickerOpen = false;
  state.lettersAnswerPickerOpen = false;
  await getLettersRoomRef().update({
    status: 'winner',
    'letters/showQuestionInLive': false,
    'letters/questionVisibleUntil': 0,
    'letters/currentCellId': '',
    'letters/currentQuestion': null,
    'letters/liveResult': null,
    'letters/winnerTeam': team,
    'letters/winnerAt': firebase.database.ServerValue.TIMESTAMP
  });
}

async function restartLettersRoom() {
  await loadQuestionsFromFirebase();
  const boardState = buildLettersBoardState();
  if (!boardState) {
    showToast('يلزم توفر 25 حرفًا مختلفًا مع الألف لإعادة اللعبة');
    return;
  }
  const room = state.room;
  const updates = {
    status: 'lobby',
    letters: {
      ...boardState,
      showQuestionInLive: false,
      questionVisibleUntil: 0,
      liveResult: null,
      winnerTeam: '',
      winnerAt: null
    }
  };
  Object.values(room?.players || {}).forEach(player => {
    const isManager = (player.role || 'player') === 'manager';
    updates[`players/${player.id}/team`] = '';
    updates[`players/${player.id}/color`] = '';
    updates[`players/${player.id}/ready`] = isManager;
  });
  state.lettersWinnerPickerOpen = false;
  state.lettersAnswerPickerOpen = false;
  state.lettersTeamAssignmentTarget = '';
  await getLettersRoomRef().update(updates);
}

async function goLettersColorPick() {

  if (!room) return;

async function pickLettersTeam(teamId) {
  const teamMeta = getLettersTeamMeta(teamId);
  const tx = await getLettersRoomRef().child('players').transaction(players => {
    if (!players?.[state.playerId]) return players;
    const me = players[state.playerId];
    if ((me.role || 'player') === 'manager') return players;
    const currentTeam = me.team || '';
    const taken = Object.values(players).filter(player =>
      (player.role || 'player') !== 'manager' &&
      player.id !== state.playerId &&
      player.team === teamId
    ).length;
    if (currentTeam !== teamId && taken >= LETTERS_TEAM_LIMIT) return;
    me.team = teamId;
    me.color = teamMeta.hex;
    me.ready = true;
    players[state.playerId] = me;
    return players;
  });
  if (!tx.committed) showToast('تعذر اختيار الفريق الآن');
}

function setLettersHostTeamTarget(teamId = '') {
  if (!state.isHost) return;
  state.lettersTeamAssignmentTarget = state.lettersTeamAssignmentTarget === teamId ? '' : teamId;
  renderLettersColorPick();
}

async function assignLettersPlayerTeam(playerId, teamId = state.lettersTeamAssignmentTarget) {
  if (!state.isHost || !teamId) return;
  const teamMeta = getLettersTeamMeta(teamId);
  const tx = await getLettersRoomRef().child('players').transaction(players => {
    if (!players?.[playerId]) return players;
    const player = players[playerId];
    if ((player.role || 'player') === 'manager') return players;
    const taken = Object.values(players).filter(item =>
      (item.role || 'player') !== 'manager' &&
      item.id !== playerId &&
      item.team === teamId
    ).length;
    if (player.team !== teamId && taken >= LETTERS_TEAM_LIMIT) return;
    if (player.team === teamId) {
      player.team = '';
      player.color = '';
      player.ready = false;
    } else {
      player.team = teamId;
      player.color = teamMeta.hex;
      player.ready = true;
    }
    players[playerId] = player;
    return players;
  });
  if (!tx.committed) showToast('تعذر تحديث فريق اللاعب الآن');
}

async function startLettersGame() {
  const room = state.room;
  const players = getLettersPlayers(room);
  if (players.length < 2) {
    showToast('يلزم لاعبان على الأقل');
    return;
  }
  if (players.some(player => !player.team)) {
    showToast('يجب أن يختار جميع اللاعبين فرقهم أولًا');
    return;
  }

async function toggleCat(cat) {
  const room = state.room;
  const selected = room.selectedCategories ? Object.values(room.selectedCategories) : [];

    selected.splice(idx, 1);

    selected.push(cat);

  await db.ref(`rooms/${state.roomId}/selectedCategories`).set(selected);

async function selectQuestion(cat, pts) {
  clearQuestionTimers();
  clearStageTimeout();
  state.evaluatingQuestionKey = '';
  // Find a question
  const snap = await db.ref('questions').orderByChild('category').equalTo(cat).once('value');
  const all = snap.val() ? Object.entries(snap.val()).map(([id, q]) => ({ id, ...q })) : [];
  const matching = all.filter(q => Number(q.points) === Number(pts));
  if (matching.length === 0) { showToast('لا يوجد سؤال متاح'); return; }
  const used = state.room?.usedQuestions ? Object.values(state.room.usedQuestions) : [];
  let available = matching.filter(q => !used.includes(q.id));
  if (available.length === 0) available = matching;
  const q = available[Math.floor(Math.random() * available.length)];

  await db.ref(`rooms/${state.roomId}`).update({
    status: 'loading',
    currentQ: { ...q, cat, pts, startTime: null, loadingAt: estimatedServerNow(), answerCounter: 0 },
    answers: null,
    answerTimes: null,
    answerOrders: null
  });
  // Add to used
  await db.ref(`rooms/${state.roomId}/usedQuestions`).push(q.id);

  state.page = 'loading';
}

// ====== LOADING SCREEN ======
function renderLoading() {
  const room = state.room;
  if (!room) return;
  if (room.status === 'question') { state.page = 'question'; renderQuestion(); return; }
  if (!['loading', 'evaluating'].includes(room.status)) { state.page = room.status; renderCurrentPage(); return; }
  const q = room.currentQ;
  if (!q) return;
  const isEvaluating = room.status === 'evaluating';
  if (!isEvaluating) {
    const loadingElapsed = q.loadingAt ? (estimatedServerNow() - q.loadingAt) : 2500;
    scheduleQuestionReveal(getQuestionRoundKey(q), 2500 - loadingElapsed);
  } else {
    const evaluatingElapsed = q.evaluatingAt ? (estimatedServerNow() - q.evaluatingAt) : 1600;
    scheduleAnswerAnalysis(getQuestionRoundKey(q), 1600 - evaluatingElapsed);
  }
  const app = getApp();
  app.innerHTML = `
    <div class="h-full w-full flex items-center justify-center p-4">
      <div class="fade-in text-center">
        <div class="text-5xl mb-4 animate-bounce">⏳</div>
        <p class="text-xl font-bold text-indigo-700 mb-2">${q?.cat || ''}</p>
        <p class="text-3xl font-black text-amber-500 mb-4">${q?.pts || ''} نقطة</p>
        <p class="text-gray-400">${isEvaluating ? 'جاري تحليل الإجابات...' : 'جاري تحميل السؤال...'}</p>
        <div class="mt-4 w-48 h-2 bg-gray-200 rounded-full mx-auto overflow-hidden">
          <div class="h-full bg-indigo-500 rounded-full animate-pulse" style="width:70%"></div>
        </div>
      </div>
    </div>`;
}

// ====== QUESTION ======
function renderQuestion() {
  const room = state.room;
  if (!room) return;
  if (room.status === 'result') { state.page = 'result'; renderResult(); return; }
  if (room.status === 'noAnswer') { state.page = 'noAnswer'; renderNoAnswer(); return; }
  if (room.status === 'game') { state.page = 'game'; renderGame(); return; }
  if (room.status !== 'question') { state.page = room.status; renderCurrentPage(); return; }

  const q = room.currentQ;
  if (!q) return;
  clearStageTimeout();
  const answers = room.answers || {};
  const answerOrders = room.answerOrders || {};
  const myAnswer = getAnswerChoice(answers[state.playerId]);
  const players = room.players ? Object.values(room.players) : [];
  const allAnswered = players.every(p => !!getAnswerChoice(answers[p.id]));
  // Parse options
  const options = parseOptions(q.options);
  const optionVotes = Object.fromEntries(options.map(opt => [
    opt,
    players
      .filter(p => getAnswerChoice(answers[p.id]) === opt)
      .sort((a, b) => Number(answerOrders[a.id] || Number.MAX_SAFE_INTEGER) - Number(answerOrders[b.id] || Number.MAX_SAFE_INTEGER))
  ]));

  // Timer
  const elapsed = q.startTime ? Math.floor((estimatedServerNow() - q.startTime) / 1000) : 0;
  const remaining = Math.max(0, 40 - elapsed);

  const app = getApp();
  app.innerHTML = `
    <div class="h-full w-full flex items-center justify-center p-4">
      <div class="fade-in text-center max-w-lg w-full">
        <div class="mb-3">
          <span class="px-3 py-1 bg-indigo-100 text-indigo-600 rounded-full text-sm font-bold">${q.cat}</span>
          <span class="px-3 py-1 bg-amber-100 text-amber-600 rounded-full text-sm font-bold mr-2">${q.pts} نقطة</span>
        </div>
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-4">
          <h3 class="text-xl font-black text-gray-800 mb-4">${q.question}</h3>
          <div class="text-center mb-3">
            <span class="text-3xl font-black ${remaining <= 10 ? 'text-red-500' : 'text-indigo-600'}" id="timerDisplay">${remaining}</span>
            <span class="text-sm text-gray-400"> ثانية</span>
          </div>
          <div class="space-y-3">
            ${options.map((opt, i) => {
              const letter = ['أ', 'ب', 'ج', 'د'][i];
              const isSelected = myAnswer === opt;
              const voters = optionVotes[opt] || [];
              return `<button onclick="${myAnswer ? '' : `submitAnswer('${opt.replace(/'/g, "\\'")}')`}"
                class="w-full p-3 rounded-xl border-2 text-right font-bold transition ${isSelected ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : myAnswer ? 'border-gray-100 bg-gray-50 text-gray-400' : 'border-gray-200 bg-white hover:border-indigo-300 text-gray-700'}"
                ${myAnswer ? 'disabled' : ''}>
                <div class="flex items-start gap-2">
                  <span class="inline-block w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 text-xs leading-6 text-center shrink-0">${letter}</span>
                  <div class="flex-1">
                    <div>${opt}</div>
                    ${voters.length ? `
                      <div class="flex flex-wrap gap-1 mt-2">
                        ${voters.map(voter => `
                          <span class="px-2 py-0.5 rounded-full text-[11px] font-black" style="background:${voter.color || '#64748b'};color:${getContrastTextColor(voter.color || '#64748b')}">
                            ${voter.name}
                          </span>
                        `).join('')}
                      </div>
                    ` : ''}
                  </div>
                </div>
              </button>`;
            }).join('')}
          </div>
        </div>
        ${myAnswer ? '<p class="text-green-500 font-bold text-sm">✓ تم إرسال إجابتك</p>' : ''}
        <p class="text-gray-400 text-xs">أجاب ${Object.keys(answers).length}/${players.length}</p>
      </div>
    </div>`;

  // Timer countdown
  clearInterval(state.timer);
  if (remaining <= 0) {
    clearTimeout(state.answerEvalTimeout);
    evaluateAnswers(getQuestionRoundKey(q));
  } else if (!allAnswered) {
    clearTimeout(state.answerEvalTimeout);
    state.answerEvalTimeout = null;
    state.timer = setInterval(async () => {
      const el = document.getElementById('timerDisplay');
      if (!el) { clearInterval(state.timer); return; }
      const now = estimatedServerNow();
      const r = Math.max(0, 40 - Math.floor((now - q.startTime) / 1000));
      el.textContent = r;
      if (r <= 10) el.className = 'text-3xl font-black text-red-500';
      if (r <= 0) {
        clearInterval(state.timer);
        evaluateAnswers(getQuestionRoundKey(q));
      }
    }, 1000);
  }
  // Check if all answered
  if (allAnswered) {
    clearInterval(state.timer);
    clearTimeout(state.answerEvalTimeout);
    state.answerEvalTimeout = setTimeout(() => evaluateAnswers(getQuestionRoundKey(q)), 250);
  }
}

function parseOptions(optStr) {
  if (!optStr) return [];
  // Try splitting by common patterns
  const cleaned = optStr.replace(/[أبجد]\)/g, '|').replace(/[أبجد]\./g, '|');
  let parts = cleaned.split('|').map(s => s.trim()).filter(Boolean);
  if (parts.length >= 2) return parts;
  parts = optStr.split(/\s{2,}/).map(s => s.trim()).filter(Boolean);
  if (parts.length >= 2) return parts;
  return optStr.split(',').map(s => s.trim()).filter(Boolean);
}

async function submitAnswer(ans) {
  const roomRef = db.ref(`rooms/${state.roomId}`);
  const tx = await roomRef.transaction(room => {
    if (!room || room.status !== 'question' || !room.currentQ || !state.playerId) return room;
    room.answers = room.answers || {};
    if (getAnswerChoice(room.answers[state.playerId])) return room;
    room.answerTimes = room.answerTimes || {};
    room.answerOrders = room.answerOrders || {};
    const nextOrder = Number(room.currentQ.answerCounter || 0) + 1;
    const submittedAt = estimatedServerNow();
    room.currentQ.answerCounter = nextOrder;
    room.answers[state.playerId] = {
      choice: ans,
      submittedAt
    };
    room.answerOrders[state.playerId] = nextOrder;
    room.answerTimes[state.playerId] = submittedAt;

    const totalPlayers = Object.keys(room.players || {}).length;
    const totalAnswers = Object.values(room.answers || {}).filter(entry => !!getAnswerChoice(entry)).length;
    if (totalPlayers > 0 && totalAnswers >= totalPlayers) {
      room.status = 'evaluating';
      room.currentQ.evaluatingAt = estimatedServerNow();
    }
    return room;
  });
  if (!tx.committed) showToast('تعذر إرسال الإجابة، حاول مرة أخرى');
}

async function evaluateAnswers(expectedQuestionKey = '') {
  clearTimeout(state.answerEvalTimeout);
  await db.ref(`rooms/${state.roomId}`).transaction(room => {
    if (!room || room.status !== 'question' || !room.currentQ) return room;
    const currentQuestionKey = getQuestionRoundKey(room.currentQ);
    if (expectedQuestionKey && expectedQuestionKey !== currentQuestionKey) return room;
    const answers = room.answers || {};
    const players = room.players ? Object.values(room.players) : [];
    const allAnswered = players.length > 0 && players.every(player => !!getAnswerChoice(answers[player.id]));
    const elapsedMs = room.currentQ.startTime ? (estimatedServerNow() - room.currentQ.startTime) : 0;
    if (!allAnswered && elapsedMs < 40000) return room;
    room.status = 'evaluating';
    room.currentQ.evaluatingAt = estimatedServerNow();
    return room;
  });
}

async function finalizeAnswerAnalysis(expectedQuestionKey = '') {
  await db.ref(`rooms/${state.roomId}`).transaction(room => {
    if (!room || room.status !== 'evaluating' || !room.currentQ) return room;
    const currentQuestionKey = getQuestionRoundKey(room.currentQ);
    if (expectedQuestionKey && expectedQuestionKey !== currentQuestionKey) return room;

    const q = room.currentQ;
    const answers = room.answers || {};
    const answerTimes = room.answerTimes || {};
    const answerOrders = room.answerOrders || {};
    const players = room.players ? Object.values(room.players) : [];
    const correctAnswer = q.answer || '';
    const ptsValue = Number(q.pts || q.points || 0);

    const correctPlayers = players
      .map(player => {
        const answer = getAnswerChoice(answers[player.id]);
        if (!answer || !isCorrectAnswer(answer, correctAnswer)) return null;
        return {
          ...player,
          order: Number(answerOrders[player.id] || Number.MAX_SAFE_INTEGER),
          time: Number(answerTimes[player.id] || Number.MAX_SAFE_INTEGER)
        };
      })
      .filter(Boolean)
      .sort((a, b) => (a.order - b.order) || (a.time - b.time));

    if (correctPlayers.length > 0) {
      const fastest = correctPlayers[0];
      room.players[fastest.id].score = Number(room.players[fastest.id].score || 0) + ptsValue;
      room.board[q.cat][ptsValue] = fastest.color || '#22c55e';
      room.status = 'result';
      room.lastResult = { winner: fastest.name, emoji: fastest.emoji, pts: ptsValue, answer: correctAnswer };
      return room;
    }

    room.board[q.cat][ptsValue] = 'dark';
    room.status = 'noAnswer';
    room.lastResult = { pts: ptsValue, answer: correctAnswer };
    return room;
  });
}

function isCorrectAnswer(given, correct) {
  const normalize = s => s.replace(/[أبجد]\)/g, '').replace(/[()]/g, '').trim().toLowerCase();
  return normalize(given) === normalize(correct) || given.includes(normalize(correct)) || normalize(correct).includes(normalize(given));
}

async function proceedToNext(expectedStatus = '') {
  await db.ref(`rooms/${state.roomId}`).transaction(room => {
    if (!room || !['result', 'noAnswer'].includes(room.status)) return room;
    if (expectedStatus && room.status !== expectedStatus) return room;
    const board = room.board || {};
    let allDone = true;
    for (const cat of Object.keys(board)) {
      for (const pts of [200, 400, 600]) {
        if (board[cat]?.[pts] === 'open') {
          allDone = false;
          break;
        }
      }
      if (!allDone) break;
    }
    if (allDone) {
      room.status = 'winner';
      room.currentQ = null;
      room.answers = null;
      room.answerTimes = null;
      room.answerOrders = null;
      return room;
    }
    const turnOrder = room.turnOrder || [];
    if (!turnOrder.length) return room;
    room.status = 'game';
    room.turnIndex = ((room.turnIndex || 0) + 1) % turnOrder.length;
    room.currentQ = null;
    room.answers = null;
    room.answerTimes = null;
    room.answerOrders = null;
    return room;
  });
}

async function sendChat(e, inputId = 'chatInput') {
  e.preventDefault();
  const input = document.getElementById(inputId);
  const text = input.value.trim();
  if (!text) return;
  const me = state.room?.players?.[state.playerId] || null;
  const messageKey = getGameRoomRef().child('chat').push().key;
  const queuedAt = estimatedServerNow();
  state.chatDraft = '';
  input.value = '';
  try {
    const tx = await getGameRoomRef().transaction(room => {
      if (!room || !messageKey) return room;
      room.chatSeq = Number(room.chatSeq || 0) + 1;
      room.chat = room.chat || {};
      room.chat[messageKey] = {
        senderId: state.playerId,
        senderName: state.playerName,
        senderRole: me?.role || 'player',
        senderTeam: me?.team || '',
        text,
        time: queuedAt,
        order: room.chatSeq
      };
      return room;
    });
    if (!tx.committed) throw new Error('chat-send-aborted');
    scrollMessagesToBottom(isLettersMode() && state.page === 'game' ? 'lettersGameChatMessages' : state.page === 'winner' ? 'winnerChatMessages' : 'chatMessages');
    input.focus();
  } catch (error) {
    state.chatDraft = text;
    input.value = text;
    input.focus();
    showToast('تعذر إرسال الرسالة');
  }
}

async function handleLettersFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('uploadProgress').classList.remove('hidden');
  const bar = document.getElementById('uploadBar');
  const status = document.getElementById('uploadStatus');
  const reader = new FileReader();
  reader.onload = async function(ev) {
    const workbook = XLSX.read(ev.target.result, { type: 'binary' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
    const dataRows = rows.slice(1).filter(r => r.length >= 2);
    const total = dataRows.length;
    const lettersSet = new Set();
    let count = 0;
    for (const row of dataRows) {
      const letter = normalizeLettersLetter(row[0]);
      const question = (row[1] || '').toString().trim();
      const answer = (row[2] || '').toString().trim();
      if (!letter || !question) continue;
      lettersSet.add(letter);
      count++;
      const pct = total ? Math.round((count / total) * 100) : 100;
      bar.style.width = pct + '%';
      status.textContent = `جاري التحميل... ${count}/${total} سؤال | ${lettersSet.size} حرف`;
      await db.ref('letterQuestions').push({ letter, question, answer });
      await new Promise(r => setTimeout(r, 20));
    }
    status.textContent = `✅ تم رفع ${count} سؤال في ${lettersSet.size} حرف`;
    bar.style.width = '100%';
    await loadQuestionsFromFirebase();
    setTimeout(() => renderAdmin(), 800);
  };
  reader.readAsBinaryString(file);
}

  modal.onclick = () => modal.classList.add('hidden');
}

async function saveLettersEditQ(id) {
  const letter = normalizeLettersLetter(document.getElementById('eqLetter').value);
  if (!letter) {
    showToast('اكتب حرفًا صحيحًا');
    return;
  }
  await db.ref('letterQuestions/' + id).update({
    letter,
    question: document.getElementById('eqQ').value.trim(),
    answer: document.getElementById('eqAns').value.trim()
  });
  document.getElementById('editModal').classList.add('hidden');
  await loadQuestionsFromFirebase();
  renderAdmin();
}

function getFilteredQuestions() {
  let qs = state.questions;
  if (state.adminFilter) qs = qs.filter(q => q.category === state.adminFilter);
  if (state.adminSearch) qs = qs.filter(q => q.question.includes(state.adminSearch));
  return qs;
}

async function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('uploadProgress').classList.remove('hidden');
  const bar = document.getElementById('uploadBar');
  const status = document.getElementById('uploadStatus');

  const reader = new FileReader();
  reader.onload = async function(ev) {
    const workbook = XLSX.read(ev.target.result, { type: 'binary' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
    const dataRows = rows.slice(1).filter(r => r.length >= 4);
    const total = dataRows.length;
    let catSet = new Set();
    let count = 0;

    for (const row of dataRows) {
      const category = (row[0] || '').toString().trim();
      const question = (row[1] || '').toString().trim();
      const options = (row[2] || '').toString().trim();
      const answer = (row[3] || '').toString().trim();
      const points = parseInt(row[4]) || 200;
      if (!question) continue;
      catSet.add(category);
      count++;
      const pct = Math.round((count / total) * 100);
      bar.style.width = pct + '%';
      status.textContent = `جاري التحميل... ${count}/${total} سؤال | ${catSet.size} تصنيف`;
      await db.ref('questions').push({ category, question, options, answer, points });
      // Small delay for visual
      await new Promise(r => setTimeout(r, 30));
    }
    status.textContent = `✅ تم رفع ${count} سؤال في ${catSet.size} تصنيف`;
    bar.style.width = '100%';
    await loadQuestionsFromFirebase();
    setTimeout(() => renderAdmin(), 1000);
  };
  reader.readAsBinaryString(file);
}

async function deleteQuestion(id) {
  await db.ref('questions/' + id).remove();
  await loadQuestionsFromFirebase();
  renderAdmin();
}

async function deleteCategory(cat) {
  const qs = state.questions.filter(q => q.category === cat);
  const updates = {};
  qs.forEach(q => { updates[q.id] = null; });
  await db.ref('questions').update(updates);
  await loadQuestionsFromFirebase();
  renderAdmin();
}

async function saveEditQ(id) {
  await db.ref('questions/' + id).update({
    category: document.getElementById('eqCat').value.trim(),
    question: document.getElementById('eqQ').value.trim(),
    options: document.getElementById('eqOpt').value.trim(),
    answer: document.getElementById('eqAns').value.trim(),
    points: parseInt(document.getElementById('eqPts').value) || 200
  });
  document.getElementById('editModal').classList.add('hidden');
  await loadQuestionsFromFirebase();
  renderAdmin();
}

function exitAdmin() { state.page = 'home'; renderCurrentPage(); }

// Utils
function shakeEl(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.animation = 'none';
  el.offsetHeight;
  el.classList.add('border-red-400');
  el.style.animation = 'shake 0.4s ease';
  setTimeout(() => el.classList.remove('border-red-400'), 1000);
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'fixed top-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-5 py-2.5 rounded-xl font-bold text-sm z-[999] fade-in shadow-lg';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// Init
(async () => {
  firebase.database().ref('.info/serverTimeOffset').on('value', snap => {
    state.serverTimeOffset = Number(snap.val() || 0);
  });
  const params = new URLSearchParams(window.location.search);
  const saved = loadRoomSession();
  const inferredGame = params.get('game') || params.get('g') || (/letters\.html$/i.test(window.location.pathname) ? 'letters' : '') || saved?.gameMode || '';
  if (inferredGame) state.gameMode = inferredGame;
  await loadQuestionsFromFirebase();
  const roomParam = params.get('r') || params.get('room') || '';
  const hasLiveRoute = !!(params.get('l') || params.get('panel') === 'live');
  const canRestore = !!saved?.roomId && (!roomParam || roomParam === saved.roomId) && !hasLiveRoute;
  if (canRestore) {
    const restored = await restoreRoomSession();
    if (restored) return;
  }
  checkUrlForRoom();
})();
window.addEventListener('beforeunload', () => {
  clearQuestionTimers();
  clearStageTimeout();
});
