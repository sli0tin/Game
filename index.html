// Firebase Init
const firebaseConfig = {

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ROOM_SESSION_KEY = 'almaidan-room-session-v1';

// State
let state = {
  page: 'home',

  roomId: '',

};

const COLORS = [
  { name: 'أحمر', hex: '#ef4444', emoji: '🔴' },
  { name: 'أزرق', hex: '#3b82f6', emoji: '🔵' },
  { name: 'أخضر', hex: '#22c55e', emoji: '🟢' },
  { name: 'برتقالي', hex: '#f97316', emoji: '🟠' },
  { name: 'بنفسجي', hex: '#a855f7', emoji: '🟣' },
  { name: 'أصفر', hex: '#eab308', emoji: '🟡' },
];

const PLAYER_EMOJIS = ['😎', '🤩', '😏', '🧐'];

let clickTimes = [];
let defaultConfig = { game_title: 'الميدان' };
let config = { ...defaultConfig };

// Element SDK
if (window.elementSdk) {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (c) => {
      config = c;
    },
    mapToCapabilities: (c) => ({

  });
}

// Utility
function genId() { return Math.random().toString(36).substr(2, 6).toUpperCase(); }
function getApp() { return document.getElementById('app'); }
function getQuestionRoundKey(q) {
  if (!q) return '';
  return [q.id || '', q.cat || '', q.pts || q.points || '', q.startTime || 'pending'].join('::');
}
function clearQuestionTimers() {
  clearInterval(state.timer);
  clearTimeout(state.answerEvalTimeout);
  state.timer = null;
  state.answerEvalTimeout = null;
}
function clearStageTimeout() {
  clearTimeout(state.stageTimeout);
  state.stageTimeout = null;
}
function buildShareLink(roomId = state.roomId) {
  const linkUrl = new URL(window.location.href);
  linkUrl.search = '';
  linkUrl.hash = '';
  linkUrl.searchParams.set('room', roomId);
  return linkUrl.toString();
}
function setRoomUrl(roomId = state.roomId) {
  if (!roomId) return;
  window.history.replaceState({}, '', buildShareLink(roomId));
}
function loadRoomSession() {
  try {
    return JSON.parse(localStorage.getItem(ROOM_SESSION_KEY) || 'null');
  } catch (_) {
    return null;
  }
}
function persistRoomSession() {
  if (!state.roomId || !state.playerId) {
    clearRoomSession();
    return;
  }
  try {
    localStorage.setItem(ROOM_SESSION_KEY, JSON.stringify({
      roomId: state.roomId,
      playerId: state.playerId,
      playerName: state.playerName || '',
      isHost: !!state.isHost
    }));
  } catch (_) {}
}
function clearRoomSession() {
  try {
    localStorage.removeItem(ROOM_SESSION_KEY);
  } catch (_) {}
}
function stopPresenceTracking(markOffline = true) {
  if (state.connectedRef && state.connectedCb) {
    state.connectedRef.off('value', state.connectedCb);
  }
  if (state.roomId && state.playerId) {
    const presenceRef = db.ref(`rooms/${state.roomId}/presence/${state.playerId}`);
    presenceRef.onDisconnect().cancel().catch(() => {});
    if (markOffline) {
      presenceRef.update({
        online: false,
        name: state.playerName || '',
        lastSeen: firebase.database.ServerValue.TIMESTAMP
      }).catch(() => {});
    }
  }
  state.connectedRef = null;
  state.connectedCb = null;
}
function startPresenceTracking() {
  stopPresenceTracking(false);
  if (!state.roomId || !state.playerId) return;
  const presenceRef = db.ref(`rooms/${state.roomId}/presence/${state.playerId}`);
  const connectedRef = firebase.database().ref('.info/connected');
  const cb = (snap) => {
    if (snap.val() !== true) return;
    presenceRef.onDisconnect().update({
      online: false,
      name: state.playerName || '',
      lastSeen: firebase.database.ServerValue.TIMESTAMP
    }).catch(() => {});
    presenceRef.update({
      online: true,
      name: state.playerName || '',
      lastSeen: firebase.database.ServerValue.TIMESTAMP
    }).catch(() => {});
  };
  connectedRef.on('value', cb);
  state.connectedRef = connectedRef;
  state.connectedCb = cb;
}
function resetRoomState({ markOffline = false, clearSession = true } = {}) {
  clearQuestionTimers();
  clearStageTimeout();
  cleanupListeners();
  stopPresenceTracking(markOffline);
  if (clearSession) clearRoomSession();
  state = {
    ...state,
    page: 'home',
    playerId: '',
    roomId: '',
    isHost: false,
    room: null,
    chatOpen: false,
    chatMessages: [],
    unreadCount: 0,
    hostPanelOpen: false,
    evaluatingQuestionKey: ''
  };
  window.history.replaceState({}, '', window.location.pathname);
  renderCurrentPage();
}
function formatPresenceStatus(playerId) {
  const presence = state.room?.presence?.[playerId];
  if (presence?.online) return 'متصل الآن';
  if (!presence?.lastSeen) return 'غير متصل';
  const diffMins = Math.max(1, Math.floor((Date.now() - presence.lastSeen) / 60000));
  if (diffMins < 60) return `آخر ظهور قبل ${diffMins} د`;
  const diffHours = Math.floor(diffMins / 60);
  if (diffHours < 24) return `آخر ظهور قبل ${diffHours} س`;
  const diffDays = Math.floor(diffHours / 24);
  return `آخر ظهور قبل ${diffDays} ي`;
}
function isPlayerOnline(playerId) {
  return !!state.room?.presence?.[playerId]?.online;
}
function renderPresenceBadge(playerId, centered = true) {
  const online = isPlayerOnline(playerId);
  return `
    <div class="flex items-center gap-1 mt-1 ${centered ? 'justify-center' : ''}">
      <span class="w-2 h-2 rounded-full ${online ? 'bg-emerald-500' : 'bg-slate-300'}"></span>
      <span class="text-[10px] font-bold ${online ? 'text-emerald-600' : 'text-slate-400'}">${online ? 'متصل الآن' : 'غير متصل'}</span>
    </div>`;
}
function getContrastTextColor(hex) {
  if (!hex || !hex.startsWith('#') || hex.length !== 7) return '#ffffff';
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const luminance = (0.299 * r) + (0.587 * g) + (0.114 * b);
  return luminance > 170 ? '#111827' : '#ffffff';
}
function scrollMessagesToBottom(id = 'chatMessages') {
  const scroll = () => {
    const el = document.getElementById(id);
    if (el) el.scrollTop = el.scrollHeight;
  };
  setTimeout(() => {
    scroll();
    if (typeof requestAnimationFrame === 'function') {
      requestAnimationFrame(scroll);
    }
  }, 0);
}
function toggleHostPanel(forceState) {
  state.hostPanelOpen = typeof forceState === 'boolean' ? forceState : !state.hostPanelOpen;
  syncHostOverlay();
}
function renderExitOverlay() {
  return `
    <div class="fixed top-3 left-3 z-[1100]">
      <button onclick="exitRoom()" class="h-10 rounded-full bg-white/95 text-slate-800 px-4 shadow-xl border border-slate-200 backdrop-blur flex items-center justify-center gap-2 text-sm font-black hover:bg-white transition">
        <span>⟵</span>
        <span>خروج</span>
      </button>
    </div>`;
}
function syncExitOverlay() {
  const existing = document.getElementById('exitOverlay');
  const canShow = !!(state.room && state.page !== 'home' && state.page !== 'admin');
  if (!canShow) {
    existing?.remove();
    return;
  }
  const exitOverlay = existing || document.createElement('div');
  exitOverlay.id = 'exitOverlay';
  exitOverlay.innerHTML = renderExitOverlay();
  if (!existing) document.body.appendChild(exitOverlay);
}
function renderHostOverlay() {
  const players = state.room?.players ? Object.values(state.room.players) : [];
  const onlineCount = players.filter(p => state.room?.presence?.[p.id]?.online).length;
  return `
    <div class="fixed top-3 right-3 z-[1100]">
      <button onclick="toggleHostPanel()" class="h-10 min-w-[42px] rounded-full bg-slate-900/90 text-white px-3 shadow-xl backdrop-blur flex items-center justify-center gap-1 text-sm font-black hover:bg-slate-800 transition">
        <span>👥</span>
        <span class="text-[11px]">${players.length}</span>
      </button>
      ${state.hostPanelOpen ? `
        <div class="fixed inset-0 bg-slate-950/20" onclick="toggleHostPanel(false)"></div>
        <div class="absolute top-12 right-0 w-80 max-w-[calc(100vw-1.5rem)] rounded-2xl bg-white/95 backdrop-blur shadow-2xl border border-slate-200 overflow-hidden">
          <div class="px-4 py-3 bg-slate-900 text-white">
            <p class="text-sm font-black">إدارة الغرفة</p>
            <p class="text-[11px] text-slate-300">${onlineCount}/${players.length} متصل الآن</p>
          </div>
          <div class="p-2 max-h-[70vh] overflow-auto space-y-1">
            <p class="px-2 pt-1 pb-2 text-[11px] text-slate-400">اضغط على اسم اللاعب لطرده من الغرفة.</p>
            ${players.map(p => {
              const isHostPlayer = p.id === state.room.host;
              const isOnline = !!state.room?.presence?.[p.id]?.online;
              return `
                <button onclick="${isHostPlayer ? '' : `kickPlayer('${p.id}')`}" ${isHostPlayer ? 'disabled' : ''}
                  class="w-full flex items-center gap-3 rounded-xl px-3 py-3 text-right transition ${isHostPlayer ? 'bg-amber-50 cursor-default' : 'hover:bg-rose-50 cursor-pointer'}">
                  <span class="w-2.5 h-2.5 rounded-full ${isOnline ? 'bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.6)]' : 'bg-slate-300'}"></span>
                  <div class="flex-1">
                    <p class="font-black text-slate-800">${p.name} ${isHostPlayer ? '👑' : ''}</p>
                    <p class="text-xs ${isOnline ? 'text-emerald-600' : 'text-slate-400'}">${formatPresenceStatus(p.id)}</p>
                  </div>
                  <span class="text-xs font-bold ${isHostPlayer ? 'text-amber-500' : 'text-rose-500'}">${isHostPlayer ? 'المضيف' : 'طرد'}</span>
                </button>`;
            }).join('')}
          </div>
        </div>
      ` : ''}
    </div>`;
}
function syncHostOverlay() {
  const existing = document.getElementById('hostOverlay');
  const canShow = state.isHost && state.room && state.page !== 'home' && state.page !== 'admin';
  if (!canShow) {
    existing?.remove();
    return;
  }
  const hostOverlay = existing || document.createElement('div');
  hostOverlay.id = 'hostOverlay';
  hostOverlay.innerHTML = renderHostOverlay();
  if (!existing) document.body.appendChild(hostOverlay);
}
function scheduleQuestionReveal(expectedQuestionKey, delayMs) {
  clearStageTimeout();
  state.stageTimeout = setTimeout(async () => {
    const roomSnap = await db.ref(`rooms/${state.roomId}`).once('value');
    const liveRoom = roomSnap.val();
    if (!liveRoom || liveRoom.status !== 'loading' || !liveRoom.currentQ) return;
    if (getQuestionRoundKey(liveRoom.currentQ) !== expectedQuestionKey) return;
    await db.ref(`rooms/${state.roomId}`).update({
      status: 'question',
      'currentQ/startTime': Date.now(),
      answers: null,
      answerTimes: null
    });
  }, Math.max(0, delayMs));
}
function scheduleAnswerAnalysis(expectedQuestionKey, delayMs) {
  clearStageTimeout();
  state.stageTimeout = setTimeout(async () => {
    await finalizeAnswerAnalysis(expectedQuestionKey);
  }, Math.max(0, delayMs));
}
async function removePlayerFromRoom(playerId, roomOverride = null) {
  const roomId = roomOverride?.id || state.roomId;
  if (!roomId || !playerId) return false;
  const room = roomOverride?.players ? roomOverride : state.room || (await db.ref(`rooms/${roomId}`).once('value')).val();
  if (!room?.players?.[playerId]) return false;

  const remainingPlayers = Object.values(room.players).filter(p => p.id !== playerId);
  if (remainingPlayers.length === 0) {
    await db.ref(`rooms/${roomId}`).remove();
    return true;
  }

  const updates = {
    [`players/${playerId}`]: null,
    [`presence/${playerId}`]: null,
    [`answers/${playerId}`]: null,
    [`answerTimes/${playerId}`]: null
  };

  if (room.host === playerId) {
    updates.host = remainingPlayers[0].id;
  }

  const turnOrder = Array.isArray(room.turnOrder) ? room.turnOrder : [];
  if (turnOrder.length) {
    const removedIdx = turnOrder.indexOf(playerId);
    const nextTurnOrder = turnOrder.filter(id => id !== playerId);
    updates.turnOrder = nextTurnOrder.length ? nextTurnOrder : null;
    if (nextTurnOrder.length) {
      let nextTurnIndex = room.turnIndex || 0;
      if (removedIdx !== -1) {
        if (removedIdx < nextTurnIndex) nextTurnIndex -= 1;
        if (removedIdx === nextTurnIndex && nextTurnIndex >= nextTurnOrder.length) nextTurnIndex = 0;
      }
      updates.turnIndex = Math.max(0, nextTurnIndex % nextTurnOrder.length);
    } else {
      updates.turnIndex = 0;
    }
  }

  if (remainingPlayers.length <= 1 && !['lobby', 'winner'].includes(room.status)) {
    updates.status = 'winner';
    updates.currentQ = null;
    updates.answers = null;
    updates.answerTimes = null;
  }

  await db.ref(`rooms/${roomId}`).update(updates);
  return true;
}
async function kickPlayer(playerId) {
  const room = state.room;
  if (!state.isHost || !room?.players?.[playerId]) return;
  if (playerId === room.host) {
    showToast('لا يمكن طرد المضيف');
    return;
  }
  const player = room.players[playerId];
  if (!window.confirm(`هل تريد طرد ${player.name} من الغرفة؟`)) return;
  await removePlayerFromRoom(playerId, room);
  showToast(`تم طرد ${player.name}`);
}
async function exitRoom(skipConfirm = false) {
  if (!state.roomId || !state.playerId) {
    resetRoomState();
    return;
  }
  if (!skipConfirm && !window.confirm('هل تريد الخروج من الغرفة؟')) return;
  const playerId = state.playerId;
  const roomSnapshot = state.room;
  clearQuestionTimers();
  clearStageTimeout();
  cleanupListeners();
  stopPresenceTracking(false);
  clearRoomSession();
  try {
    await removePlayerFromRoom(playerId, roomSnapshot);
  } catch (_) {}
  resetRoomState({ markOffline: false, clearSession: false });
}

// Track rapid clicks for admin
document.addEventListener('click', () => {
  const now = Date.now();
  clickTimes.push(now);
  clickTimes = clickTimes.filter(t => now - t < 2000);
  if (clickTimes.length >= 5 && state.page === 'home') {
    document.getElementById('adminBtn')?.classList.remove('hidden');
    clickTimes = [];
  }
});

// Firebase helpers
function listenRoom(roomId) {
  cleanupListeners();
  const ref = db.ref('rooms/' + roomId);
  const cb = ref.on('value', snap => {
    const data = snap.val();
    if (!data) {
      if (state.roomId) resetRoomState();
      return;
    }
    if (state.playerId && data.players && !data.players[state.playerId]) {
      resetRoomState();
      showToast('تم إخراجك من الغرفة');
      return;
    }
    state.room = data;
    if (state.playerId) {
      state.isHost = data.host === state.playerId;
      state.playerName = data.players?.[state.playerId]?.name || state.playerName;
      persistRoomSession();
      setRoomUrl(data.id || state.roomId);
    }
    if (data.status !== 'question') {
      clearQuestionTimers();
      state.evaluatingQuestionKey = '';
    }
    if (!['result', 'noAnswer'].includes(data.status)) {
      clearStageTimeout();
    }
    // Update chat
    if (data.chat) {
      const msgs = Object.values(data.chat);
      const chatVisible = state.chatOpen || state.page === 'winner';
      if (!chatVisible) {
        const newCount = msgs.length - state.chatMessages.length;
        if (newCount > 0) state.unreadCount += newCount;
      } else {
        state.unreadCount = 0;
      }
      state.chatMessages = msgs;
    } else {
      state.chatMessages = [];
      state.unreadCount = 0;
    }
    renderCurrentPage();
  });
  state.listeners.push({ ref, cb });
}

function cleanupListeners() {
  state.listeners.forEach(l => l.ref.off('value', l.cb));
  state.listeners = [];
}

// Load questions from Firebase
async function loadQuestionsFromFirebase() {
  const snap = await db.ref('questions').once('value');
  const data = snap.val();
  if (!data) { state.questions = []; state.categories = []; return; }
  state.questions = Object.entries(data).map(([id, q]) => ({ id, ...q }));
  state.categories = [...new Set(state.questions.map(q => q.category))];
}

// Render router
function renderCurrentPage() {
  switch (state.page) {
    case 'home': renderHome(); break;
    case 'admin': renderAdmin(); break;
    case 'lobby': renderLobby(); break;
    case 'colorPick': renderColorPick(); break;
    case 'catPick': renderCatPick(); break;
    case 'game': renderGame(); break;
    case 'question': renderQuestion(); break;
    case 'loading': renderLoading(); break;
    case 'evaluating': renderLoading(); break;
    case 'result': renderResult(); break;
    case 'noAnswer': renderNoAnswer(); break;
    case 'winner': renderWinner(); break;
  }
  lucide.createIcons();
  syncExitOverlay();
  syncHostOverlay();
  if (state.page === 'winner') {
    state.unreadCount = 0;
    scrollMessagesToBottom('winnerChatMessages');
  } else if (state.chatOpen) {
    state.unreadCount = 0;
    scrollMessagesToBottom('chatMessages');
  }
}

async function restoreRoomSession() {
  const saved = loadRoomSession();
  if (!saved?.roomId || !saved?.playerId) return false;

  try {
    const snap = await db.ref('rooms/' + saved.roomId).once('value');
    const room = snap.val();
    if (!room?.players?.[saved.playerId]) {
      clearRoomSession();
      return false;
    }

    state.roomId = saved.roomId;
    state.playerId = saved.playerId;
    state.playerName = room.players[saved.playerId]?.name || saved.playerName || '';
    state.room = room;
    state.isHost = room.host === saved.playerId;
    state.hostPanelOpen = false;
    state.page = room.status || 'lobby';
    listenRoom(state.roomId);
    startPresenceTracking();
    persistRoomSession();
    setRoomUrl(state.roomId);
    renderCurrentPage();
    return true;
  } catch (_) {
    return false;
  }
}

async function joinRoom() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { shakeEl('nameInput'); return; }
  const snap = await db.ref('rooms/' + state.roomId).once('value');
  const room = snap.val();
  if (!room) { showToast('الغرفة غير موجودة'); return; }
  const playerCount = room.players ? Object.keys(room.players).length : 0;
  if (playerCount >= 4) { showToast('الغرفة ممتلئة (4/4)'); return; }
  if (room.status !== 'lobby') { showToast('اللعبة بدأت بالفعل'); return; }
  state.playerName = name;
  state.playerId = genId();
  state.isHost = false;
  state.hostPanelOpen = false;
  const idx = playerCount;
  await db.ref('rooms/' + state.roomId + '/players/' + state.playerId).set({
    name, id: state.playerId, emoji: PLAYER_EMOJIS[idx] || '😀', color: '', score: 0, ready: false
  });
  listenRoom(state.roomId);
  startPresenceTracking();
  persistRoomSession();
  setRoomUrl();
  state.page = 'lobby';
  renderCurrentPage();
}

async function toggleCat(cat) {
  const room = state.room;
  const selected = room.selectedCategories ? Object.values(room.selectedCategories) : [];
  if (selected.includes(cat)) {
    const idx = selected.indexOf(cat);
    selected.splice(idx, 1);
  } else {
    if (selected.length >= 6) return;
    selected.push(cat);
  }
  await db.ref(`rooms/${state.roomId}/selectedCategories`).set(selected);
}

async function startGame() {
  const room = state.room;
  const selected = room.selectedCategories ? Object.values(room.selectedCategories) : [];
  // Build game board
  const board = {};
  for (const cat of selected) {
    board[cat] = { 200: 'open', 400: 'open', 600: 'open' };
  }
  const players = Object.values(room.players);
  const turnOrder = players.map(p => p.id);
  await db.ref(`rooms/${state.roomId}`).update({
    status: 'game',
    board,
    turnIndex: 0,
    turnOrder,
    currentQ: null
  });
  state.page = 'game';
}

// ====== GAME BOARD ======
function renderGame() {
  const room = state.room;
  if (!room) return;
  if (room.status === 'question') { state.page = 'question'; renderQuestion(); return; }
  if (room.status === 'result') { state.page = 'result'; renderResult(); return; }
  if (room.status === 'noAnswer') { state.page = 'noAnswer'; renderNoAnswer(); return; }
  if (room.status === 'winner') { state.page = 'winner'; renderWinner(); return; }
  if (room.status !== 'game') { state.page = room.status; renderCurrentPage(); return; }

  const players = room.players ? Object.values(room.players) : [];
  const board = room.board || {};
  const turnOrder = room.turnOrder || [];
  const turnIdx = room.turnIndex || 0;
  const currentTurn = turnOrder[turnIdx % turnOrder.length];
  const turnPlayer = players.find(p => p.id === currentTurn);
  const isMyTurn = currentTurn === state.playerId;
  const cats = Object.keys(board);

  const app = getApp();
  app.innerHTML = `
    <div class="h-full w-full flex flex-col p-3 overflow-auto">
      <!-- Players bar -->
      <div class="flex justify-center gap-3 mb-2 flex-wrap">
        ${players.map(p => `
          <div class="text-center px-4 py-2 rounded-xl" style="background:${p.color || '#e5e7eb'}22; border: 2px solid ${p.color || '#e5e7eb'}">
            <span class="text-2xl">${p.emoji}</span>
            <p class="text-xs font-bold" style="color:${p.color || '#333'}">${p.name}</p>
            <p class="text-lg font-black" style="color:${p.color || '#333'}">${p.score || 0}</p>
            ${renderPresenceBadge(p.id)}
          </div>
        `).join('')}
      </div>
      <!-- Chat button -->
      <div class="flex justify-center mb-2">
        <button onclick="toggleChat()" class="relative px-4 py-1.5 bg-white shadow rounded-full text-sm font-bold text-gray-600 hover:bg-gray-50 transition">
          💬 الدردشة
          ${state.unreadCount > 0 ? `<span class="chat-badge">${state.unreadCount}</span>` : ''}
        </button>
      </div>
      <!-- Turn indicator -->
      <div class="text-center mb-3">
        <p class="text-xl font-black text-indigo-700">الدور على: ${turnPlayer?.emoji || ''} ${turnPlayer?.name || ''}</p>
        ${isMyTurn ? '<p class="text-sm text-green-500 font-bold">اختر سؤالاً!</p>' : '<p class="text-sm text-gray-400">انتظر دورك...</p>'}
      </div>
      <!-- Category cards -->
      <div class="grid grid-cols-3 gap-3 flex-1">
        ${cats.map(cat => {
          const catData = board[cat] || {};
          return `<div class="bg-white rounded-xl shadow p-3 text-center">
            <p class="font-bold text-sm text-indigo-700 mb-2 truncate">${cat}</p>
            <div class="space-y-2">
              ${[200, 400, 600].map(pts => {
                const st = catData[pts] || 'open';
                if (st === 'open') {
                  return `<button onclick="${isMyTurn ? `selectQuestion('${cat.replace(/'/g, "\\'")}',${pts})` : ''}"
                    class="w-full py-2 rounded-lg font-bold text-sm transition ${isMyTurn ? 'bg-gray-100 hover:bg-indigo-100 text-gray-700 cursor-pointer' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}">${pts}</button>`;
                } else if (st === 'dark') {
                  return `<button disabled class="w-full py-2 rounded-lg font-bold text-sm bg-gray-800 text-gray-500 cursor-not-allowed opacity-40">${pts}</button>`;
                } else {
                  // Colored by player
                  return `<button disabled class="w-full py-2 rounded-lg font-bold text-sm text-white cursor-not-allowed" style="background:${st}">${pts}</button>`;
                }
              }).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
    ${renderChatModal()}`;
}

async function selectQuestion(cat, pts) {
  clearQuestionTimers();
  clearStageTimeout();
  state.evaluatingQuestionKey = '';
  // Find a question
  const snap = await db.ref('questions').orderByChild('category').equalTo(cat).once('value');
  const all = snap.val() ? Object.entries(snap.val()).map(([id, q]) => ({ id, ...q })) : [];
  const matching = all.filter(q => Number(q.points) === Number(pts));
  if (matching.length === 0) { showToast('لا يوجد سؤال متاح'); return; }
  const used = state.room?.usedQuestions ? Object.values(state.room.usedQuestions) : [];
  let available = matching.filter(q => !used.includes(q.id));
  if (available.length === 0) available = matching;
  const q = available[Math.floor(Math.random() * available.length)];

  await db.ref(`rooms/${state.roomId}`).update({
    status: 'loading',
    currentQ: { ...q, cat, pts, startTime: null, loadingAt: Date.now() },
    answers: null,
    answerTimes: null
  });
  // Add to used
  await db.ref(`rooms/${state.roomId}/usedQuestions`).push(q.id);

  state.page = 'loading';
  scheduleQuestionReveal(getQuestionRoundKey({ ...q, cat, pts, startTime: null }), 2500);
}

// ====== LOADING SCREEN ======
function renderLoading() {
  const room = state.room;
  if (!room) return;
  if (room.status === 'question') { state.page = 'question'; renderQuestion(); return; }
  if (!['loading', 'evaluating'].includes(room.status)) { state.page = room.status; renderCurrentPage(); return; }
  const q = room.currentQ;
  if (!q) return;
  const isEvaluating = room.status === 'evaluating';
  if (state.isHost && !isEvaluating) {
    const loadingElapsed = q.loadingAt ? (Date.now() - q.loadingAt) : 2500;
    scheduleQuestionReveal(getQuestionRoundKey(q), 2500 - loadingElapsed);
  } else if (state.isHost && isEvaluating) {
    const evaluatingElapsed = q.evaluatingAt ? (Date.now() - q.evaluatingAt) : 1600;
    scheduleAnswerAnalysis(getQuestionRoundKey(q), 1600 - evaluatingElapsed);
  }
  const app = getApp();
  app.innerHTML = `
    <div class="h-full w-full flex items-center justify-center p-4">
      <div class="fade-in text-center">
        <div class="text-5xl mb-4 animate-bounce">⏳</div>
        <p class="text-xl font-bold text-indigo-700 mb-2">${q?.cat || ''}</p>
        <p class="text-3xl font-black text-amber-500 mb-4">${q?.pts || ''} نقطة</p>
        <p class="text-gray-400">${isEvaluating ? 'جاري تحليل الإجابات...' : 'جاري تحميل السؤال...'}</p>
        <div class="mt-4 w-48 h-2 bg-gray-200 rounded-full mx-auto overflow-hidden">
          <div class="h-full bg-indigo-500 rounded-full animate-pulse" style="width:70%"></div>
        </div>
      </div>
    </div>`;
}

// ====== QUESTION ======
function renderQuestion() {
  const room = state.room;
  if (!room) return;
  if (room.status === 'result') { state.page = 'result'; renderResult(); return; }
  if (room.status === 'noAnswer') { state.page = 'noAnswer'; renderNoAnswer(); return; }
  if (room.status === 'game') { state.page = 'game'; renderGame(); return; }
  if (room.status !== 'question') { state.page = room.status; renderCurrentPage(); return; }

  const q = room.currentQ;
  if (!q) return;
  clearStageTimeout();
  const answers = room.answers || {};
  const myAnswer = answers[state.playerId];
  const players = room.players ? Object.values(room.players) : [];
  const allAnswered = players.every(p => answers[p.id] !== undefined);
  // Parse options
  const options = parseOptions(q.options);
  const optionVotes = Object.fromEntries(options.map(opt => [
    opt,
    players.filter(p => answers[p.id] === opt)
  ]));
  const questionKey = getQuestionRoundKey(q);

  // Timer
  const elapsed = q.startTime ? Math.floor((Date.now() - q.startTime) / 1000) : 0;
  const remaining = Math.max(0, 40 - elapsed);

  const app = getApp();
  app.innerHTML = `
    <div class="h-full w-full flex items-center justify-center p-4">
      <div class="fade-in text-center max-w-lg w-full">
        <div class="mb-3">
          <span class="px-3 py-1 bg-indigo-100 text-indigo-600 rounded-full text-sm font-bold">${q.cat}</span>
          <span class="px-3 py-1 bg-amber-100 text-amber-600 rounded-full text-sm font-bold mr-2">${q.pts} نقطة</span>
        </div>
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-4">
          <h3 class="text-xl font-black text-gray-800 mb-4">${q.question}</h3>
          <div class="text-center mb-3">
            <span class="text-3xl font-black ${remaining <= 10 ? 'text-red-500' : 'text-indigo-600'}" id="timerDisplay">${remaining}</span>
            <span class="text-sm text-gray-400"> ثانية</span>
          </div>
          <div class="space-y-3">
            ${options.map((opt, i) => {
              const letter = ['أ', 'ب', 'ج', 'د'][i];
              const isSelected = myAnswer === opt;
              const voters = optionVotes[opt] || [];
              return `<button onclick="${myAnswer ? '' : `submitAnswer('${opt.replace(/'/g, "\\'")}')`}"
                class="w-full p-3 rounded-xl border-2 text-right font-bold transition ${isSelected ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : myAnswer ? 'border-gray-100 bg-gray-50 text-gray-400' : 'border-gray-200 bg-white hover:border-indigo-300 text-gray-700'}"
                ${myAnswer ? 'disabled' : ''}>
                <div class="flex items-start gap-2">
                  <span class="inline-block w-6 h-6 rounded-full bg-indigo-100 text-indigo-600 text-xs leading-6 text-center shrink-0">${letter}</span>
                  <div class="flex-1">
                    <div>${opt}</div>
                    ${voters.length ? `
                      <div class="flex flex-wrap gap-1 mt-2">
                        ${voters.map(voter => `
                          <span class="px-2 py-0.5 rounded-full text-[11px] font-black" style="background:${voter.color || '#64748b'};color:${getContrastTextColor(voter.color || '#64748b')}">
                            ${voter.name}
                          </span>
                        `).join('')}
                      </div>
                    ` : ''}
                  </div>
                </div>
              </button>`;
            }).join('')}
          </div>
        </div>
        ${myAnswer ? '<p class="text-green-500 font-bold text-sm">✓ تم إرسال إجابتك</p>' : ''}
        <p class="text-gray-400 text-xs">أجاب ${Object.keys(answers).length}/${players.length}</p>
      </div>
    </div>`;

  // Timer countdown
  clearInterval(state.timer);
  if (remaining <= 0) {
    clearTimeout(state.answerEvalTimeout);
    if (state.isHost) evaluateAnswers(questionKey);
  } else if (!allAnswered) {
    clearTimeout(state.answerEvalTimeout);
    state.answerEvalTimeout = null;
    state.timer = setInterval(async () => {
      const el = document.getElementById('timerDisplay');
      if (!el) { clearInterval(state.timer); return; }
      const now = Date.now();
      const r = Math.max(0, 40 - Math.floor((now - q.startTime) / 1000));
      el.textContent = r;
      if (r <= 10) el.className = 'text-3xl font-black text-red-500';
      if (r <= 0) {
        clearInterval(state.timer);
        if (state.isHost) evaluateAnswers(questionKey);
      }
    }, 1000);
  }
  // Check if all answered
  if (allAnswered && state.isHost) {
    clearInterval(state.timer);
    clearTimeout(state.answerEvalTimeout);
    if (state.evaluatingQuestionKey !== questionKey) {
      state.answerEvalTimeout = setTimeout(() => evaluateAnswers(questionKey), 400);
    }
  }
}

function parseOptions(optStr) {
  if (!optStr) return [];
  // Try splitting by common patterns
  const cleaned = optStr.replace(/[أبجد]\)/g, '|').replace(/[أبجد]\./g, '|');
  let parts = cleaned.split('|').map(s => s.trim()).filter(Boolean);
  if (parts.length >= 2) return parts;
  parts = optStr.split(/\s{2,}/).map(s => s.trim()).filter(Boolean);
  if (parts.length >= 2) return parts;
  return optStr.split(',').map(s => s.trim()).filter(Boolean);
}

async function submitAnswer(ans) {
  await db.ref(`rooms/${state.roomId}/answers/${state.playerId}`).set(ans);
  await db.ref(`rooms/${state.roomId}/answerTimes/${state.playerId}`).set(Date.now());
}

async function evaluateAnswers(expectedQuestionKey = '') {
  const room = state.room;
  if (!room || room.status !== 'question' || !room.currentQ) return;
  const currentQuestionKey = getQuestionRoundKey(room.currentQ);
  if (expectedQuestionKey && expectedQuestionKey !== currentQuestionKey) return;
  if (state.evaluatingQuestionKey === currentQuestionKey) return;
  state.evaluatingQuestionKey = currentQuestionKey;
  clearTimeout(state.answerEvalTimeout);

  const roomSnap = await db.ref(`rooms/${state.roomId}`).once('value');
  const liveRoom = roomSnap.val();
  if (!liveRoom || liveRoom.status !== 'question' || !liveRoom.currentQ) {
    state.evaluatingQuestionKey = '';
    return;
  }
  if (getQuestionRoundKey(liveRoom.currentQ) !== currentQuestionKey) {
    state.evaluatingQuestionKey = '';
    return;
  }
  await db.ref(`rooms/${state.roomId}`).update({
    status: 'evaluating',
    'currentQ/evaluatingAt': Date.now()
  });
  scheduleAnswerAnalysis(currentQuestionKey, 1600);
}

async function finalizeAnswerAnalysis(expectedQuestionKey = '') {
  const roomSnap = await db.ref(`rooms/${state.roomId}`).once('value');
  const liveRoom = roomSnap.val();
  if (!liveRoom || liveRoom.status !== 'evaluating' || !liveRoom.currentQ) return;
  const currentQuestionKey = getQuestionRoundKey(liveRoom.currentQ);
  if (expectedQuestionKey && expectedQuestionKey !== currentQuestionKey) return;

  const q = liveRoom.currentQ;
  const answers = liveRoom.answers || {};
  const answerTimes = liveRoom.answerTimes || {};
  const players = liveRoom.players ? Object.values(liveRoom.players) : [];
  const correctAnswer = q.answer || '';
  const ptsValue = Number(q.pts || q.points || 0);

  let correctPlayers = [];
  for (const p of players) {
    const ans = answers[p.id];
    if (ans && isCorrectAnswer(ans, correctAnswer)) {
      correctPlayers.push({ ...p, time: answerTimes[p.id] || Infinity });
    }
  }

  if (correctPlayers.length > 0) {
    correctPlayers.sort((a, b) => a.time - b.time);
    const fastest = correctPlayers[0];
    const newScore = Number(fastest.score || 0) + ptsValue;
    await db.ref(`rooms/${state.roomId}`).update({
      [`players/${fastest.id}/score`]: newScore,
      [`board/${q.cat}/${ptsValue}`]: fastest.color || '#22c55e',
      status: 'result',
      lastResult: { winner: fastest.name, emoji: fastest.emoji, pts: ptsValue, answer: correctAnswer }
    });
  } else {
    await db.ref(`rooms/${state.roomId}`).update({
      [`board/${q.cat}/${ptsValue}`]: 'dark',
      status: 'noAnswer',
      lastResult: { pts: ptsValue, answer: correctAnswer }
    });
  }
}

function isCorrectAnswer(given, correct) {
  const normalize = s => s.replace(/[أبجد]\)/g, '').replace(/[()]/g, '').trim().toLowerCase();
  return normalize(given) === normalize(correct) || given.includes(normalize(correct)) || normalize(correct).includes(normalize(given));
}

async function proceedToNext() {
  const room = state.room;
  if (!room) return;
  const board = room.board || {};
  // Check if all questions done
  let allDone = true;
  for (const cat of Object.keys(board)) {
    for (const pts of [200, 400, 600]) {
      if (board[cat]?.[pts] === 'open') { allDone = false; break; }
    }
    if (!allDone) break;
  }
  if (allDone) {
    await db.ref(`rooms/${state.roomId}/status`).set('winner');
    return;
  }
  // Next turn
  const turnOrder = room.turnOrder || [];
  const nextIdx = ((room.turnIndex || 0) + 1) % turnOrder.length;
  await db.ref(`rooms/${state.roomId}`).update({
    status: 'game',
    turnIndex: nextIdx,
    currentQ: null,
    answers: null,
    answerTimes: null
  });
}

async function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('uploadProgress').classList.remove('hidden');
  const bar = document.getElementById('uploadBar');
  const status = document.getElementById('uploadStatus');

  const reader = new FileReader();
  reader.onload = async function(ev) {
    const workbook = XLSX.read(ev.target.result, { type: 'binary' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
    const dataRows = rows.slice(1).filter(r => r.length >= 4);
    const total = dataRows.length;
    let catSet = new Set();
    let count = 0;

    for (const row of dataRows) {
      const category = (row[0] || '').toString().trim();
      const question = (row[1] || '').toString().trim();
      const options = (row[2] || '').toString().trim();
      const answer = (row[3] || '').toString().trim();
      const points = parseInt(row[4]) || 200;
      if (!question) continue;
      catSet.add(category);
      count++;
      const pct = Math.round((count / total) * 100);
      bar.style.width = pct + '%';
      status.textContent = `جاري التحميل... ${count}/${total} سؤال | ${catSet.size} تصنيف`;
      await db.ref('questions').push({ category, question, options, answer, points });
      // Small delay for visual
      await new Promise(r => setTimeout(r, 30));
    }
    status.textContent = `✅ تم رفع ${count} سؤال في ${catSet.size} تصنيف`;
    bar.style.width = '100%';
    await loadQuestionsFromFirebase();
    setTimeout(() => renderAdmin(), 1000);
  };
  reader.readAsBinaryString(file);
}

function exitAdmin() { state.page = 'home'; renderCurrentPage(); }

// Utils
function shakeEl(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.animation = 'none';
  el.offsetHeight;
  el.classList.add('border-red-400');
  el.style.animation = 'shake 0.4s ease';
  setTimeout(() => el.classList.remove('border-red-400'), 1000);
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'fixed top-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-5 py-2.5 rounded-xl font-bold text-sm z-[999] fade-in shadow-lg';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// Init
(async () => {
  await loadQuestionsFromFirebase();
  const restored = await restoreRoomSession();
  if (!restored) checkUrlForRoom();
})();
window.addEventListener('beforeunload', () => {
  clearQuestionTimers();
  clearStageTimeout();
});
</script></body>
